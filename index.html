<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">

<title>Sticker Generator</title>

<style>
  body {
    margin: 0;
    font-family: system-ui;
    background: #0b0b0b;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  h1 {
    font-size: 22px;
    margin-bottom: 10px;
  }

  input {
    width: 100%;
    max-width: 320px;
    padding: 14px;
    border-radius: 12px;
    border: none;
    outline: none;
    font-size: 16px;
    margin-bottom: 12px;
  }

  button {
    padding: 14px 18px;
    border-radius: 12px;
    border: none;
    background: white;
    color: black;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 20px;
  }

  .sticker {
    margin-top: 20px;
    font-size: 64px;
    padding: 30px;
    border-radius: 24px;
    background: #1a1a1a;
    min-width: 120px;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hint {
    opacity: 0.6;
    font-size: 13px;
    text-align: center;
    margin-top: 10px;
  }
</style>
</head>

<body>

<h1>Text → Sticker Generator</h1>

<input id="text" placeholder="type something like 'fire cat'">

<button onclick="generate()">Generate Sticker</button>

<div class="sticker" id="sticker">🙂</div>

<div class="hint">
  No login • works offline-style • instant stickers
</div>

<script>
function generate() {
  const input = document.getElementById("text").value.toLowerCase();
  const sticker = document.getElementById("sticker");

  // simple “AI-style” mapping system
  let output = "✨";

  if (input.includes("fire")) output = "🔥";
  if (input.includes("cat")) output = "🐱";
  if (input.includes("dog")) output = "🐶";
  if (input.includes("skull")) output = "💀";
  if (input.includes("love")) output = "❤️";
  if (input.includes("money")) output = "💸";
  if (input.includes("angel")) output = "😇";
  if (input.includes("devil")) output = "😈";
  if (input.includes("cry")) output = "😭";
  if (input.includes("cool")) output = "😎";
  if (input.includes("fire cat")) output = "🐱🔥";
  if (input.includes("evil cat")) output = "🐱😈";
  if (input.includes("ghost")) output = "👻";

  sticker.innerText = output;
}
</script>

</body>
</html>
