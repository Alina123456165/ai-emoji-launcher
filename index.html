<script>

let isGenerating = false;

function setStatus(t) {
  const el = document.getElementById("status");
  if (el) el.innerText = t;
}

function generate() {
  if (isGenerating) return; // 🔒 prevents back-to-back freeze

  const text = document.getElementById("text").value;
  if (!text) return;

  const style = document.getElementById("style").value;
  const img = document.getElementById("img");

  isGenerating = true;
  setStatus("Generating...");

  // 🔥 cache-bust so every request is unique
  const prompt = `${text}, ${style}, sticker, high detail, ${Date.now()}`;

  const url =
    "https://image.pollinations.ai/prompt/" +
    encodeURIComponent(prompt);

  let done = false;

  const timeout = setTimeout(() => {
    if (!done) {
      setStatus("Slow response... retrying");
      isGenerating = false;
    }
  }, 8000); // 8s safety reset

  const test = new Image();

  test.onload = () => {
    done = true;
    clearTimeout(timeout);

    img.src = url;
    img.style.display = "block";

    setStatus("Done");
    isGenerating = false;
  };

  test.onerror = () => {
    done = true;
    clearTimeout(timeout);

    setStatus("Retry failed — try again");
    isGenerating = false;
  };

  test.src = url;
}

</script>
