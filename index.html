<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Sticker AI</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sticker AI">

<style>
  body {
    margin: 0;
    font-family: system-ui;
    background: #0b0b0b;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 50px 12px;
  }

  input, select, button {
    width: 100%;
    max-width: 360px;
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
  }

  input, select {
    background: #1a1a1a;
    color: white;
  }

  button {
    background: white;
    color: black;
    font-weight: 600;
  }

  #status {
    margin-top: 10px;
    opacity: 0.7;
  }

  iframe {
    margin-top: 15px;
    width: 320px;
    height: 320px;
    border-radius: 18px;
    border: none;
    background: #111;
  }
</style>
</head>

<body>

<input id="text" placeholder="type: fire cat, anime skull">

<select id="style">
  <option value="cute sticker, soft lighting">Cute</option>
  <option value="anime style, bold outline">Anime</option>
  <option value="3d render, glossy">3D</option>
  <option value="graffiti street art">Graffiti</option>
  <option value="minimal flat icon">Minimal</option>
</select>

<button onclick="generate()">Generate</button>

<div id="status">Ready</div>

<iframe id="frame"></iframe>

<script>

let locked = false;
let lastTime = 0;

function setStatus(t) {
  document.getElementById("status").innerText = t;
}

function buildUrl(prompt) {
  return "https://image.pollinations.ai/prompt/" +
    encodeURIComponent(prompt);
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

async function generate() {

  if (locked) return;

  const text = document.getElementById("text").value.trim();
  const style = document.getElementById("style").value;
  const frame = document.getElementById("frame");

  if (!text) return;

  locked = true;

  // 🔥 cooldown prevents overload spam
  const now = Date.now();
  const wait = 3000 - (now - lastTime);
  if (wait > 0) await sleep(wait);

  setStatus("Generating...");

  const prompt =
    `${text}, ${style}, sticker, high quality, clean background, ${Date.now()}`;

  const url = buildUrl(prompt);

  // 🔥 iframe load (this is your requested setup)
  frame.src = url;

  let done = false;

  const timeout = setTimeout(() => {
    if (!done) {
      setStatus("AI slow — try again");
      locked = false;
    }
  }, 15000);

  frame.onload = () => {
    done = true;
    clearTimeout(timeout);

    setStatus("Done");
    lastTime = Date.now();
    locked = false;
  };

}

</script>

</body>
</html>
