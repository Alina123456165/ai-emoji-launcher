<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genmoji Text-to-Sticker Engine</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .app-layout {
            display: flex;
            width: 100vw;
            height: 100vh;
        }
        /* Left Panel Controls */
        .control-panel {
            width: 380px;
            background-color: #111827;
            border-right: 1px solid #1f2937;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.75rem;
            z-index: 10;
        }
        .branding h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #ff7e5f, #feb47b, #86e3ce);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.25rem;
        }
        .branding p {
            font-size: 0.85rem;
            color: #9ca3af;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #9ca3af;
        }
        input[type="text"] {
            width: 100%;
            padding: 0.85rem 1rem;
            background-color: #1f2937;
            border: 2px solid #374151;
            border-radius: 0.75rem;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #feb47b;
        }
        .style-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
        }
        .style-btn {
            background-color: #1f2937;
            border: 2px solid transparent;
            color: white;
            padding: 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .style-btn.active {
            background-color: #374151;
            border-color: #feb47b;
        }
        .color-pickers {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }
        .color-node {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #1f2937;
            padding: 0.5rem;
            border-radius: 0.5rem;
        }
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 0.25rem;
            cursor: pointer;
            background: none;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 0.25rem; }

        .slider-bar {
            width: 100%;
            accent-color: #feb47b;
        }
        .export-btn {
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: #0b0f19;
            padding: 1rem;
            border: none;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            margin-top: auto;
        }
        .export-btn:hover { opacity: 0.95; }
        .export-btn:active { transform: scale(0.98); }

        /* Fullscreen Preview Stage */
        .preview-stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(#1f2937 1px, transparent 1px);
            background-size: 24px 24px;
            position: relative;
        }
        .canvas-wrap {
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.6));
        }
        canvas {
            display: block;
            max-width: 85vw;
            max-height: 85vh;
        }
    </style>
</head>
<body>

    <div class="app-layout">
        <div class="control-panel">
            <div class="branding">
                <h1>Genmoji Engine</h1>
                <p>Instant Text-to-Sticker generator</p>
            </div>

            <!-- Input Prompt -->
            <div class="input-group">
                <label>Sticker Text / Emoji</label>
                <input type="text" id="sticker-text" value="Cool!" placeholder="Type anything..." maxlength="15">
            </div>

            <!-- Sticker Preset Themes -->
            <div class="input-group">
                <label>Genmoji Aesthetics</label>
                <div class="style-grid">
                    <button class="style-btn active" onclick="setPreset('#FF416C', '#FF4B2B', 'Bubblegum')">Bubblegum</button>
                    <button class="style-btn" onclick="setPreset('#a8ff78', '#78ffd6', 'Cyberpunk')">Neon Lime</button>
                    <button class="style-btn" onclick="setPreset('#00c6ff', '#0072ff', 'Ocean')">Electric Blue</button>
                    <button class="style-btn" onclick="setPreset('#f9d423', '#ff4e50', 'Sunset')">Acid Sun</button>
                </div>
            </div>

            <!-- Custom Gradients -->
            <div class="input-group">
                <label>Custom Text Gradient</label>
                <div class="color-pickers">
                    <div class="color-node">
                        <input type="color" id="grad-1" value="#FF416C">
                        <span style="font-size:0.75rem">Color A</span>
                    </div>
                    <div class="color-node">
                        <input type="color" id="grad-2" value="#FF4B2B">
                        <span style="font-size:0.75rem">Color B</span>
                    </div>
                </div>
            </div>

            <!-- Die-Cut Border Configuration -->
            <div class="input-group">
                <label>Sticker Border Thickness</label>
                <input type="range" id="border-slider" class="slider-bar" min="10" max="35" value="22">
            </div>

            <button class="export-btn" id="download-sticker">Export Sticker (.PNG)</button>
        </div>

        <div class="preview-stage">
            <div class="canvas-wrap">
                <canvas id="stickerCanvas" width="600" height="600"></canvas>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('stickerCanvas');
        const ctx = canvas.getContext('2d');
        const textInput = document.getElementById('sticker-text');
        const color1 = document.getElementById('grad-1');
        const color2 = document.getElementById('grad-2');
        const borderSlider = document.getElementById('border-slider');

        function drawSticker() {
            const text = textInput.value || " ";
            const borderSize = parseInt(borderSlider.value);
            
            // Clear entire canvas to transparent so it downloads as a true alpha sticker
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dynamically scale typography sizes based on string length
            let fontSize = 140;
            if (text.length > 5) fontSize = 100;
            if (text.length > 9) fontSize = 65;

            ctx.font = `italic 900 ${fontSize}px system-ui, -apple-system, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            const x = canvas.width / 2;
            const y = canvas.height / 2;

            // --- LAYER 1: Thick White Die-Cut Matte Sticker Border ---
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = borderSize;
            ctx.lineJoin = 'round';
            ctx.miterLimit = 2;
            ctx.strokeText(text, x, y);

            // --- LAYER 2: Inner Dark Contrast Shadow Stroke ---
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.lineWidth = borderSize + 6;
            ctx.strokeText(text, x, y);
            
            // Redraw white boundary cleanly over the shade anchor
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = borderSize;
            ctx.strokeText(text, x, y);

            // --- LAYER 3: Radiant Graphic Text Gradient Fill ---
            const gradient = ctx.createLinearGradient(x - 150, y - 50, x + 150, y + 50);
            gradient.addColorStop(0, color1.value);
            gradient.addColorStop(1, color2.value);
            
            ctx.fillStyle = gradient;
            ctx.fillText(text, x, y);
        }

        // Configuration presets management
        function setPreset(c1, c2, activeName) {
            color1.value = c1;
            color2.value = c2;
            
            document.querySelectorAll('.style-btn').forEach(btn => {
                if(btn.textContent.includes(activeName)) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            drawSticker();
        }

        // Live updating hooks
        textInput.addEventListener('input', drawSticker);
        color1.addEventListener('input', drawSticker);
        color2.addEventListener('input', drawSticker);
