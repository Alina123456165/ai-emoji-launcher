<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Genmoji Sticker Studio</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .app-layout {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        /* Presentation stage box */
        .preview-stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(#1f2937 1px, transparent 1px);
            background-size: 20px 20px;
            padding: 1.5rem;
            min-height: 0;
            position: relative;
        }
        #sticker-output {
            max-width: 85vw;
            max-height: 50vh;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.6));
            display: none;
            -webkit-touch-callout: default !important;
            pointer-events: auto;
            user-select: none;
        }
        /* Mobile-Docked Controller Dashboard Panel */
        .control-panel {
            width: 100vw;
            background-color: #111827;
            border-top: 1px solid #1f2937;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.5);
            z-index: 100;
        }
        .branding {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .branding h1 {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status-text {
            font-size: 0.75rem;
            color: #feb47b;
            font-weight: 600;
        }
        input[type="text"] {
            width: 100%;
            padding: 0.85rem 1rem;
            background-color: #1f2937;
            border: 2px solid #374151;
            border-radius: 0.75rem;
            color: white;
            font-size: 16px; /* Bypasses iOS zoom-shifting layout bugs */
            outline: none;
            -webkit-appearance: none;
        }
        input[type="text"]:focus {
            border-color: #feb47b;
        }
        .gen-btn {
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: #0b0f19;
            padding: 1rem;
            border: none;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            text-align: center;
        }
        .gen-btn:disabled {
            background: #252d3d;
            color: #6b7280;
            cursor: not-allowed;
            opacity: 0.6;
        }
        /* Loading Animation */
        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid #1f2937;
            border-top: 4px solid #feb47b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #hidden-canvas { display: none; }
    </style>
</head>
<body>

    <div class="app-layout">
        <div class="preview-stage">
            <div class="spinner" id="loading-spinner"></div>
            <!-- Interactive Native iOS Long-Press Save Asset Target Container -->
            <img id="sticker-output" alt="AI Sticker Preview Target">
        </div>

        <div class="control-panel">
            <div class="branding">
                <h1>AI Genmoji Studio</h1>
                <span class="status-text" id="status-msg">Type a word to begin</span>
            </div>

            <div class="input-group">
                <input type="text" id="prompt-input" value="" placeholder="Type anything (e.g. crystal candy, space kitten)..." autocomplete="off" autocapitalize="off" autocorrect="off">
            </div>

            <button class="gen-btn" id="generate-btn">Generate AI Sticker</button>
        </div>
    </div>

    <!-- Background Pixel Processing Engine Matrix Canvas -->
    <canvas id="hidden-canvas" width="512" height="512"></canvas>

    <script>
        const promptInput = document.getElementById('prompt-input');
        const generateBtn = document.getElementById('generate-btn');
        const statusMsg = document.getElementById('status-msg');
        const spinner = document.getElementById('loading-spinner');
        const imgOutput = document.getElementById('sticker-output');
        const canvas = document.getElementById('hidden-canvas');
        const ctx = canvas.getContext('2d');

        // Force clear layout on hard reloading cycles to wipe form data
        window.addEventListener('DOMContentLoaded', () => {
            promptInput.value = '';
        });

        async function generateAISticker() {
            const query = promptInput.value.trim();
            if (!query) return alert("Type an object idea first!");

            // Initialize loading states
            generateBtn.disabled = true;
            spinner.style.display = "block";
            imgOutput.style.display = "none";
            statusMsg.textContent = "AI is rendering image...";

            // Structural background instructions forcing clean object silhouettes over pitch-black backdrops
            const structuredPrompt = encodeURIComponent(`${query}, cute 3d emoji icon sticker layout, vibrant pop vector, centered single object, solid completely black background, high resolution digital app style`);
            const randomSeed = Math.floor(Math.random() * 9999999);
            
            // This is an open-tier gateway endpoint architecture built specifically to bypass client CORS restrictions
            const gatewayUrl = `https://pollinations.ai{structuredPrompt}?width=512&height=512&seed=${randomSeed}&nologo=true`;

            try {
                // Fetch directly as binary chunks to read pixel context safely on iOS Safari
                const connection = await fetch(gatewayUrl);
                if (!connection.ok) throw new Error("API stream timeout");
                
                const dataBlob = await connection.blob();
                
                // Read binary block safely into browser local storage string paths
                const streamReader = new FileReader();
                streamReader.readAsDataURL(dataBlob);
                streamReader.onloadend = function () {
                    const base64DataImage = streamReader.result;
                    
                    const aiImageElement = new Image();
                    aiImageElement.src = base64DataImage;
                    aiImageElement.onload = function() {
                        statusMsg.textContent = "Processing sticker edges...";
                        processStickerLayers(aiImageElement);
                    };
                };

            } catch (error) {
                console.error(error);
                statusMsg.textContent = "API error. Click Generate again.";
                generateBtn.disabled = false;
                spinner.style.display = "none";
            }
        }

        function processStickerLayers(rawAiImage) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. Render primary source to processing buffer matrix
            ctx.drawImage(rawAiImage, 0, 0, canvas.width, canvas.height);
            
            const matrixData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const binaryPixels = matrixData.data;

            // 2. BACKGROUND STRIPPER: Loop array channels mapping out dark pixels down to 0 alpha values
            for (let i = 0; i < binaryPixels.length; i += 4) {
                let red = binaryPixels[i];
                let green = binaryPixels[i + 1];
                let blue = binaryPixels[i + 2];
                
                // If pixel context targets close to black backdrop values, force alpha transparent channels
                if (red < 45 && green < 45 && blue < 45) {
                    binaryPixels[i + 3] = 0; 
                }
            }
            ctx.putImageData(matrixData, 0, 0);

            // Copy transparency-isolated matrix profile to an isolated offscreen mask layer
            const maskCanvas = document.createElement('canvas');
            maskCanvas.width = canvas.width;
            maskCanvas.height = canvas.height;
            const maskCtx = maskCanvas.getContext('2d');
            maskCtx.drawImage(canvas, 0, 0);

            // 3. VINYL DIE-CUT MACHINE: Render solid white offset stroke bounds wrapping object silhouettes
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.shadowColor = 'rgba(0, 0, 0, 0.4)';
            ctx.shadowBlur = 12;
            ctx.shadowOffsetY = 6;
