<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">

<title>Sticker Generator</title>

<style>
  body {
    margin: 0;
    font-family: system-ui;
    background: #0b0b0b;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: 20px;
  }

  h1 {
    font-size: 20px;
    margin-bottom: 12px;
  }

  input {
    width: 100%;
    max-width: 340px;
    padding: 14px;
    border-radius: 12px;
    border: none;
    outline: none;
    font-size: 16px;
    margin-bottom: 12px;
  }

  button {
    padding: 14px 18px;
    border-radius: 12px;
    border: none;
    background: white;
    color: black;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 20px;
  }

  img {
    width: 260px;
    height: 260px;
    object-fit: cover;
    border-radius: 24px;
    background: #1a1a1a;
    display: none;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }

  .hint {
    margin-top: 12px;
    opacity: 0.5;
    font-size: 12px;
    text-align: center;
  }
</style>
</head>

<body>

<h1>Text → Sticker Image Generator</h1>

<input id="text" placeholder="type something like: fire cat sticker">

<button onclick="generate()">Generate Sticker</button>

<img id="img">

<div class="hint">
  Free AI image generation • no login • uses public API
</div>

<script>
function generate() {
  const text = document.getElementById("text").value;
  const img = document.getElementById("img");

  if (!text) return;

  // Pollinations AI (free image generator)
  const url = "https://image.pollinations.ai/prompt/" + encodeURIComponent(
    text + ", cute sticker, centered, clean background, high quality, digital sticker style"
  );

  img.src = url;
  img.style.display = "block";
}
</script>

</body>
</html>
