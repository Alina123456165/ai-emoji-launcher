<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>AI Sticker App</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="preconnect" href="https://image.pollinations.ai">

<style>
  body {
    margin: 0;
    font-family: system-ui;
    background: #0b0b0b;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 70px 12px 20px;
  }

  input, select {
    width: 100%;
    max-width: 360px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 8px;
    font-size: 16px;
    background: #1a1a1a;
    color: white;
  }

  button {
    margin-top: 10px;
    padding: 12px 16px;
    border-radius: 10px;
    border: none;
    background: white;
    color: black;
    font-weight: 600;
    font-size: 16px;
  }

  #img {
    width: 280px;
    height: 280px;
    margin-top: 14px;
    border-radius: 18px;
    object-fit: cover;
    background: #111;
    display: none;
    transition: opacity 0.15s ease;
  }

  #status {
    margin-top: 10px;
    opacity: 0.7;
    min-height: 20px;
  }
</style>
</head>

<body>

<input id="text" placeholder="type: fire cat, anime skull">

<select id="style">
  <option value="cute sticker, soft lighting">Cute</option>
  <option value="anime style, bold outline">Anime</option>
  <option value="3d render, glossy">3D</option>
  <option value="graffiti street art">Graffiti</option>
  <option value="minimal flat icon">Minimal</option>
</select>

<button onclick="generate()">Generate</button>

<div id="status"></div>

<img id="img">

<script>

let isGenerating = false;
let lastUrl = "";

function setStatus(t) {
  document.getElementById("status").innerText = t;
}

function buildUrl(prompt) {
  return "https://image.pollinations.ai/prompt/" +
    encodeURIComponent(prompt);
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

async function fetchWithTimeout(url, timeout = 12000) {
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), timeout);

  try {
    const res = await fetch(url, {
      cache: "no-store",
      signal: controller.signal
    });

    clearTimeout(id);

    if (!res.ok) throw new Error("bad response");

    const blob = await res.blob();

    if (blob.size < 1500) throw new Error("invalid image");

    return URL.createObjectURL(blob);

  } catch (e) {
    clearTimeout(id);
    throw e;
  }
}

async function generate() {

  if (isGenerating) return;

  const text = document.getElementById("text").value.trim();
  const style = document.getElementById("style").value;
  const img = document.getElementById("img");

  if (!text) return;

  isGenerating = true;
  setStatus("Generating...");

  const prompt =
    `${text}, ${style}, sticker, high detail, ${Date.now()} ${Math.random()}`;

  const url = buildUrl(prompt);

  let success = false;

  for (let i = 0; i < 2; i++) {

    try {

      setStatus(i === 0 ? "Generating..." : "Retrying...");

      const blobUrl = await fetchWithTimeout(url);

      // cleanup old blob
      if (lastUrl) URL.revokeObjectURL(lastUrl);

      lastUrl = blobUrl;

      img.src = blobUrl;
      img.style.display = "block";
      img.style.opacity = "1";

      setStatus("Done");

      success = true;
      break;

    } catch (e) {
      await sleep(400);
    }
  }

  if (!success) {
    setStatus("Failed — try again");
  }

  isGenerating = false;
}

</script>

</body>
</html>
