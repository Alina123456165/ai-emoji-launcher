<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Sticker AI App</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sticker AI">

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0b0b0b;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 70px 12px;
}

input, select {
  width: 100%;
  max-width: 360px;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  background: #1a1a1a;
  color: white;
  font-size: 16px;
}

button {
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: white;
  color: black;
  font-weight: 600;
}

#img {
  width: 280px;
  height: 280px;
  margin-top: 14px;
  border-radius: 18px;
  object-fit: cover;
  background: #111;
}

#status {
  margin-top: 10px;
  opacity: 0.7;
}
</style>
</head>

<body>

<input id="text" placeholder="type: fire cat, anime skull">

<select id="style">
  <option value="cute sticker">Cute</option>
  <option value="anime style">Anime</option>
  <option value="3d render">3D</option>
  <option value="graffiti style">Graffiti</option>
  <option value="minimal icon">Minimal</option>
</select>

<button onclick="generate()">Generate</button>

<div id="status"></div>

<img id="img">

<script>

let lastRun = 0;
let locked = false;

function setStatus(t) {
  document.getElementById("status").innerText = t;
}

function buildUrl(prompt) {
  return "https://image.pollinations.ai/prompt/" +
    encodeURIComponent(prompt);
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

async function generate() {

  if (locked) return;

  const text = document.getElementById("text").value.trim();
  const style = document.getElementById("style").value;
  const img = document.getElementById("img");

  if (!text) return;

  locked = true;

  // 🔥 cooldown prevents overload spam
  const now = Date.now();
  const wait = 2000 - (now - lastRun);
  if (wait > 0) await sleep(wait);

  setStatus("Generating...");

  const prompt =
    `${text}, ${style}, sticker, high detail, ${Date.now()}`;

  const url = buildUrl(prompt);

  const tempImg = new Image();

  let done = false;

  const timeout = setTimeout(() => {
    if (!done) {
      setStatus("AI slow — try again");
      locked = false;
    }
  }, 14000);

  tempImg.onload = () => {
    done = true;
    clearTimeout(timeout);

    img.src = url;
    setStatus("Done");

    lastRun = Date.now();
    locked = false;
  };

  tempImg.onerror = () => {
    done = true;
    clearTimeout(timeout);

    setStatus("Failed — try again");
    locked = false;
  };

  tempImg.src = url;
}

</script>

</body>
</html>
