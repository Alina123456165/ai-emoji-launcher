<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>AI Sticker Generator</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sticker AI">

<style>
  body {
    margin: 0;
    font-family: system-ui;
    background: #0b0b0b;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 12px;
  }

  input, select {
    width: 100%;
    max-width: 360px;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    background: #1a1a1a;
    color: white;
    font-size: 16px;
  }

  button {
    width: 100%;
    max-width: 360px;
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: white;
    color: black;
    font-weight: 600;
  }

  #img {
    width: 280px;
    height: 280px;
    margin-top: 15px;
    border-radius: 18px;
    object-fit: cover;
    background: #111;
    display: none;
  }

  #status {
    margin-top: 10px;
    opacity: 0.7;
    min-height: 20px;
  }
</style>
</head>

<body>

<input id="text" placeholder="type: fire cat, anime skull">

<select id="style">
  <option value="cute sticker, soft lighting">Cute</option>
  <option value="anime style, bold outline">Anime</option>
  <option value="3d render, glossy">3D</option>
  <option value="graffiti street art">Graffiti</option>
  <option value="minimal flat icon">Minimal</option>
</select>

<button onclick="generate()">Generate</button>

<div id="status">Ready</div>

<img id="img">

<script>

let locked = false;
let lastTime = 0;

function setStatus(t) {
  document.getElementById("status").innerText = t;
}

function buildUrl(prompt) {
  return "https://image.pollinations.ai/prompt/" +
    encodeURIComponent(prompt);
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

async function generate() {

  if (locked) return;

  const text = document.getElementById("text").value.trim();
  const style = document.getElementById("style").value;
  const img = document.getElementById("img");

  if (!text) return;

  locked = true;

  // 🔥 HARD GLOBAL COOLDOWN (THIS PREVENTS QUEUE FULL ERROR)
  const now = Date.now();
  const wait = 6500 - (now - lastTime);
  if (wait > 0) {
    await sleep(wait);
  }

  setStatus("Generating...");

  const prompt =
    `${text}, ${style}, sticker, high quality, clean background, ${Date.now()}`;

  const url = buildUrl(prompt);

  const test = new Image();

  let done = false;

  const timeout = setTimeout(() => {
    if (!done) {
      setStatus("AI slow — try again in a few seconds");
      locked = false;
    }
  }, 15000);

  test.onload = () => {
    done = true;
    clearTimeout(timeout);

    img.src = url;
    img.style.display = "block";

    setStatus("Done");

    lastTime = Date.now();
    locked = false;
  };

  test.onerror = () => {
    done = true;
    clearTimeout(timeout);

    setStatus("Queue full — wait a few seconds");
    locked = false;
  };

  test.src = url;
}

</script>

</body>
</html>
