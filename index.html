<script>

let lastPrompt = "";
let lastGoodImage = "";

const styles = [
  "cute sticker, clean background",
  "anime sticker, bold outline",
  "3d glossy sticker render",
  "graffiti street art sticker",
  "minimal flat icon sticker"
];

function pickStyle() {
  return styles[Math.floor(Math.random() * styles.length)];
}

function buildPrompt(text) {
  return `${text}, ${pickStyle()}, centered, high detail, sticker`;
}

function makeUrl(prompt) {
  return "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt);
}

function setStatus(msg) {
  const el = document.getElementById("status");
  if (el) el.innerText = msg;
}

function showImage(url) {
  const img = document.getElementById("img");
  if (!img) return;

  img.src = url;
  img.style.display = "block";

  lastGoodImage = url;
  save(url);
}

function generate() {
  try {
    const textEl = document.getElementById("text");
    if (!textEl) return;

    const text = textEl.value.trim();
    if (!text) return;

    lastPrompt = text;

    setStatus("Generating...");

    const prompt = buildPrompt(text + " " + Math.random().toString(36).slice(2,6));
    const url = makeUrl(prompt);

    const testImg = new Image();

    testImg.onload = () => {
      showImage(url);
      setStatus("Done");
    };

    testImg.onerror = () => {
      setStatus("Retrying fallback...");
      fallback(text);
    };

    testImg.src = url;

  } catch (e) {
    setStatus("Error recovered");
    fallback(lastPrompt || "sticker");
  }
}

function fallback(text) {
  const safePrompt = `${text}, simple sticker, clean design`;
  const url = makeUrl(safePrompt);

  const img = new Image();

  img.onload = () => {
    showImage(url);
    setStatus("Fallback used");
  };

  img.onerror = () => {
    if (lastGoodImage) {
      showImage(lastGoodImage);
      setStatus("Using cached image");
    } else {
      setStatus("Generation failed");
    }
  };

  img.src = url;
}

function regenerate() {
  if (!lastPrompt) return;
  generate();
}

function save(url) {
  try {
    let data = JSON.parse(localStorage.getItem("stickers") || "[]");
    data.unshift(url);
    data = data.slice(0, 10);
    localStorage.setItem("stickers", JSON.stringify(data));
    render();
  } catch {}
}

function render() {
  try {
    const data = JSON.parse(localStorage.getItem("stickers") || "[]");
    const el = document.getElementById("gallery");
    if (!el) return;

    el.innerHTML = "";

    data.forEach(url => {
      const img = document.createElement("img");
      img.src = url;
      el.appendChild(img);
    });
  } catch {}
}

window.addEventListener("load", render);

</script>
