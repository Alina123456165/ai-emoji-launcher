<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>YouTube Launcher</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="YouTube">

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, sans-serif;
}

#splash {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.logo {
    width: 110px;
    height: 78px;
    background: red;
    border-radius: 22px;
    position: relative;
}

.logo::before {
    content: "";
    position: absolute;
    left: 42px;
    top: 24px;
    border-left: 26px solid white;
    border-top: 15px solid transparent;
    border-bottom: 15px solid transparent;
}

.text {
    color: white;
    margin-top: 22px;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.5px;
}

.sub {
    color: #777;
    margin-top: 10px;
    font-size: 14px;
}

.fadeout {
    opacity: 0;
    transition: opacity 0.45s ease;
}
</style>
</head>
<body>

<div id="splash">
    <div class="logo"></div>
    <div class="text">YouTube</div>
    <div class="sub">Launching desktop mode...</div>
</div>

<script>
function launchYouTube() {

    // desktop mode params
    const url = "https://www.youtube.com/?app=desktop";

    // delay makes it feel app-like
    setTimeout(() => {
        document.getElementById("splash").classList.add("fadeout");

        setTimeout(() => {
            window.location.href = url;
        }, 450);

    }, 900);
}

launchYouTube();
</script>

</body>
</html>
