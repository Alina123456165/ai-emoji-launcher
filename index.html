<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>AI Sticker App</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
body {
  margin:0;
  font-family:system-ui;
  background:#0b0b0b;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:70px 12px 20px 12px;
}

input, select {
  width:100%;
  max-width:360px;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:8px;
  background:#1a1a1a;
  color:white;
  font-size:16px;
}

button {
  margin-top:10px;
  padding:12px 16px;
  border:none;
  border-radius:10px;
  background:white;
  color:black;
  font-weight:600;
}

#img {
  width:280px;
  height:280px;
  margin-top:14px;
  border-radius:18px;
  object-fit:cover;
  display:none;
  background:#111;
}

#status {
  margin-top:10px;
  opacity:0.7;
  min-height:20px;
}

iframe {
  position:absolute;
  width:1px;
  height:1px;
  opacity:0;
  pointer-events:none;
}
</style>
</head>

<body>

<input id="text" placeholder="type: fire cat, anime skull">

<select id="style">
  <option value="cute sticker, soft lighting">Cute</option>
  <option value="anime style, bold outline">Anime</option>
  <option value="3d render, glossy">3D</option>
  <option value="graffiti street art">Graffiti</option>
  <option value="minimal flat icon">Minimal</option>
</select>

<button onclick="generate()">Generate</button>

<div id="status"></div>

<img id="img">

<iframe src="https://perchance.org/ai-text-to-image-generator"></iframe>

<script>

let isGenerating = false;
let currentBlobUrl = null;

function setStatus(t) {
  document.getElementById("status").innerText = t;
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

function makeUrls(prompt) {

  const encoded =
    encodeURIComponent(prompt);

  return [

    // primary
    `https://image.pollinations.ai/prompt/${encoded}`,

    // fallback variation
    `https://image.pollinations.ai/prompt/${encoded}?width=768&height=768&seed=${Date.now()}`,

    // second fallback variation
    `https://image.pollinations.ai/prompt/${encoded}?nofeed=true&seed=${Math.random()}`
  ];
}

async function fetchImage(url) {

  const response = await fetch(url, {
    cache: "no-store"
  });

  if (!response.ok) {
    throw new Error("Bad response");
  }

  const blob = await response.blob();

  // IMPORTANT:
  // reject fake tiny responses
  if (blob.size < 5000) {
    throw new Error("Tiny invalid image");
  }

  return blob;
}

async function generate() {

  if (isGenerating) {
    setStatus("Please wait...");
    return;
  }

  const text =
    document.getElementById("text").value.trim();

  if (!text) return;

  const style =
    document.getElementById("style").value;

  const img =
    document.getElementById("img");

  isGenerating = true;

  setStatus("Generating...");

  const prompt =
    `${text}, ${style}, sticker, high detail, ${Date.now()} ${Math.random()}`;

  const urls = makeUrls(prompt);

  let success = false;

  for (const url of urls) {

    try {

      await sleep(700);

      const blob =
        await fetchImage(url);

      if (currentBlobUrl) {
        URL.revokeObjectURL(currentBlobUrl);
      }

      const blobUrl =
        URL.createObjectURL(blob);

      currentBlobUrl = blobUrl;

      img.style.display = "none";
      img.removeAttribute("src");

      void img.offsetHeight;

      img.src = blobUrl;

      img.style.display = "block";

      setStatus("Done");

      success = true;
      break;

    } catch (e) {

      console.log("Attempt failed", e);

      setStatus("Retrying...");

    }
  }

  if (!success) {
    setStatus("AI overloaded — try again");
  }

  isGenerating = false;
}

</script>

</body>
</html>
