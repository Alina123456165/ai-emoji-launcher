<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Genmoji Sticker Generator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .app-layout {
            display: flex;
            width: 100vw;
            height: 100vh;
        }
        .control-panel {
            width: 360px;
            background-color: #111827;
            border-right: 1px solid #1f2937;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            z-index: 10;
        }
        .branding h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #9ca3af;
        }
        input[type="text"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: #1f2937;
            border: 2px solid #374151;
            border-radius: 0.5rem;
            color: white;
            font-size: 1.1rem;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #feb47b;
        }
        .gen-btn {
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: #0b0f19;
            padding: 1rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .gen-btn:hover { opacity: 0.9; }
        .gen-btn:disabled {
            background: #374151;
            color: #9ca3af;
            cursor: not-allowed;
        }
        .status-msg {
            font-size: 0.85rem;
            color: #feb47b;
            text-align: center;
            min-height: 20px;
        }
        
        /* Fullscreen Stage UI Layout */
        .preview-stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(#1f2937 1px, transparent 1px);
            background-size: 20px 20px;
            position: relative;
        }
        #sticker-output {
            max-width: 75vw;
            max-height: 75vh;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.6));
            display: none;
            cursor: pointer;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #1f2937;
            border-top: 5px solid #feb47b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #hidden-canvas { display: none; }
    </style>
</head>
<body>

    <div class="app-layout">
        <div class="control-panel">
            <div class="branding">
                <h1>Genmoji Studio</h1>
                <p style="color: #9ca3af; font-size: 0.85rem;">Cloudflare Workers AI Powered Sticker Generator</p>
            </div>

            <div class="input-group">
                <label>What sticker do you want?</label>
                <input type="text" id="prompt-input" value="" placeholder="Type anything..." autocomplete="off">
            </div>

            <button class="gen-btn" id="generate-btn">Generate AI Sticker</button>
            <div class="status-msg" id="status-text">Type a word and hit Generate.</div>

            <p style="color: #6b7280; font-size: 0.75rem; margin-top: auto; line-height: 1.4;">
                💡 <b>How to save:</b> Once generated, right-click or long-press directly on the final image preview to save it as a transparent PNG file.
            </p>
        </div>

        <div class="preview-stage">
            <div class="spinner" id="loading-spinner"></div>
            <img id="sticker-output" alt="Your Generated AI Sticker">
        </div>
    </div>

    <canvas id="hidden-canvas" width="512" height="512"></canvas>

    <script>
        const promptInput = document.getElementById('prompt-input');
        const generateBtn = document.getElementById('generate-btn');
        const statusText = document.getElementById('status-text');
        const spinner = document.getElementById('loading-spinner');
        const imgOutput = document.getElementById('sticker-output');
        
        const canvas = document.getElementById('hidden-canvas');
        const ctx = canvas.getContext('2d');

        // Force reset input on load to completely kill form cache bugs
        window.addEventListener('load', () => { promptInput.value = ''; });

        async function generateAISticker() {
            const userPrompt = promptInput.value.trim();
            if (!userPrompt) return alert("Please enter a word to generate!");

            generateBtn.disabled = true;
            spinner.style.display = "block";
            imgOutput.style.display = "none";
            statusText.textContent = "AI engine is drawing...";

            // Structural layout rules sent to the generator
            const finalPrompt = `${userPrompt}, cute 3d emoji sticker icon, centered single object, solid pure pitch-black background, digital art vector illustration style`;

            try {
                // Completely decoupled from Pollinations. Routes through an open Cloudflare Workers AI edge node.
                const response = await fetch("https://workers.dev", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: finalPrompt })
                });

                if (!response.ok) throw new Error("Worker endpoint failed");
                
                const blob = await response.blob();
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = function () {
                    const img = new Image();
                    img.src = reader.result;
                    img.onload = function() {
                        statusText.textContent = "Cutting sticker edges...";
                        processStickerLayers(img);
                    };
                };

            } catch (error) {
                console.error(error);
                statusText.textContent = "Server busy. Please click generate again.";
                generateBtn.disabled = false;
                spinner.style.display = "none";
            }
        }

        function processStickerLayers(aiImage) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(aiImage, 0, 0, canvas.width, canvas.height);
            
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;

            // Background Removal Engine (Chroma Keying)
            for (let i = 0; i < data.length; i += 4) {
                // If pixel color trends towards black background bounds, clear alpha down to 0
                if (data[i] < 45 && data[i+1] < 45 && data[i+2] < 45) {
                    data[i + 3] = 0; 
                }
            }
            ctx.putImageData(imgData, 0, 0);

            // Clone cutout mapping canvas
            const cutOutCanvas = document.createElement('canvas');
            cutOutCanvas.width = canvas.width;
            cutOutCanvas.height = canvas.height;
            const cutOutCtx = cutOutCanvas.getContext('2d');
            cutOutCtx.drawImage(canvas, 0, 0);

            // Paint Die-Cut Vinyl Sticker Border
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.shadowColor = 'rgba(0, 0, 0, 0.35)';
            ctx.shadowBlur = 12;
            ctx.shadowOffsetY = 6;

            const thickness = 14; 
            for (let angle = 0; angle < 360; angle += 15) {
                const dx = Math.cos(angle * Math.PI / 180) * thickness;
                const dy = Math.sin(angle * Math.PI / 180) * thickness;
                ctx.drawImage(cutOutCanvas, dx, dy);
            }

            ctx.globalCompositeOperation = 'source-in';
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Restore baseline parameters and overlay primary icon
            ctx.globalCompositeOperation = 'source-over';
            ctx.shadowColor = 'transparent';
            ctx.drawImage(cutOutCanvas, 0, 0);

            // Export to native savable layout wrapper element
            imgOutput.src = canvas.toDataURL('image/png');
            spinner.style.display = "none";
            imgOutput.style.display = "block";
            statusText.textContent = "Sticker complete! Save it below.";
            generateBtn.disabled = false;
        }

        generateBtn.addEventListener('click', generateAISticker);
        promptInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') generateAISticker(); });
    </script>
</body>
</html>
