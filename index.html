<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">

<title>Sticker App</title>

<style>
  body {
    margin: 0;
    font-family: system-ui;
    background: #0b0b0b;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px;
    min-height: 100vh;
  }

  h1 {
    font-size: 20px;
    margin: 10px 0 14px;
  }

  input {
    width: 100%;
    max-width: 360px;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    outline: none;
  }

  .row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin: 10px 0;
  }

  button {
    padding: 10px 14px;
    border-radius: 10px;
    border: none;
    background: #fff;
    color: #000;
    font-weight: 600;
    cursor: pointer;
  }

  .active {
    background: #ffcc00;
  }

  #img {
    width: 280px;
    height: 280px;
    border-radius: 22px;
    margin-top: 16px;
    display: none;
    object-fit: cover;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  }

  #status {
    margin-top: 10px;
    opacity: 0.6;
    font-size: 13px;
  }

  .gallery {
    margin-top: 18px;
    width: 100%;
    max-width: 360px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
  }

  .gallery img {
    width: 70px;
    height: 70px;
    border-radius: 12px;
    object-fit: cover;
  }
</style>
</head>

<body>

<h1>Sticker Generator</h1>

<input id="text" placeholder="type: fire cat, cool skull, cute dog">

<div class="row">
  <button onclick="setStyle('cute')">Cute</button>
  <button onclick="setStyle('anime')">Anime</button>
  <button onclick="setStyle('graffiti')">Graffiti</button>
  <button onclick="setStyle('3d')" >3D</button>
</div>

<button onclick="generate()">Generate Sticker</button>

<div id="status"></div>

<img id="img">

<div class="row">
  <button onclick="downloadImage()">Download</button>
</div>

<div class="gallery" id="gallery"></div>

<script>
let style = "cute";

function setStyle(s) {
  style = s;

  document.querySelectorAll("button").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
}

function buildPrompt(text) {
  return `${text}, ${style} sticker, centered, clean background, high detail, die-cut sticker, sharp edges`;
}

function generate() {
  const text = document.getElementById("text").value;
  if (!text) return;

  const status = document.getElementById("status");
  const img = document.getElementById("img");

  status.innerText = "Generating sticker...";

  const prompt = buildPrompt(text);

  const url = "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt);

  img.src = url;
  img.style.display = "block";

  img.onload = () => {
    status.innerText = "Done";

    saveToGallery(url);
  };
}

function saveToGallery(url) {
  let gallery = JSON.parse(localStorage.getItem("stickers") || "[]");
  gallery.unshift(url);
  gallery = gallery.slice(0, 10);
  localStorage.setItem("stickers", JSON.stringify(gallery));
  renderGallery();
}

function renderGallery() {
  const gallery = JSON.parse(localStorage.getItem("stickers") || "[]");
  const el = document.getElementById("gallery");
  el.innerHTML = "";

  gallery.forEach(url => {
    const img = document.createElement("img");
    img.src = url;
    el.appendChild(img);
  });
}

function downloadImage() {
  const img = document.getElementById("img");
  if (!img.src) return;

  const a = document.createElement("a");
  a.href = img.src;
  a.download = "sticker.png";
  a.click();
}

renderGallery();
</script>

</body>
</html>

<body>

<h1>Text → Sticker Image Generator</h1>

<input id="text" placeholder="type something like: fire cat sticker">

<button onclick="generate()">Generate Sticker</button>

<img id="img">

<div class="hint">
  Free AI image generation • no login • uses public API
</div>

<script>
function generate() {
  const text = document.getElementById("text").value;
  const img = document.getElementById("img");

  if (!text) return;

  // Pollinations AI (free image generator)
  const url = "https://image.pollinations.ai/prompt/" + encodeURIComponent(
    text + ", cute sticker, centered, clean background, high quality, digital sticker style"
  );

  img.src = url;
  img.style.display = "block";
}
</script>

</body>
</html>
