<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Sticker Generator Stable</title>

<style>
  body {
    margin: 0;
    font-family: system-ui;
    background: #0b0b0b;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 70px 12px;
  }

  input, select {
    width: 100%;
    max-width: 360px;
    padding: 12px;
    margin-top: 8px;
    border-radius: 10px;
    border: none;
    background: #1a1a1a;
    color: white;
    font-size: 16px;
  }

  button {
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: white;
    color: black;
    font-weight: 600;
    font-size: 16px;
  }

  #img {
    width: 280px;
    height: 280px;
    margin-top: 14px;
    border-radius: 18px;
    object-fit: cover;
    background: #111;
    display: none;
  }

  #status {
    margin-top: 10px;
    opacity: 0.7;
    min-height: 20px;
  }
</style>
</head>

<body>

<input id="text" placeholder="type: fire cat, anime skull">

<select id="style">
  <option value="cute sticker, soft lighting">Cute</option>
  <option value="anime style, bold outline">Anime</option>
  <option value="3d render, glossy">3D</option>
  <option value="graffiti street art">Graffiti</option>
  <option value="minimal flat icon">Minimal</option>
</select>

<button onclick="generate()">Generate</button>

<div id="status"></div>

<img id="img">

<script>

let queue = [];
let running = false;
let lastRun = 0;

function setStatus(t) {
  document.getElementById("status").innerText = t;
}

function buildUrl(prompt) {
  return "https://image.pollinations.ai/prompt/" +
    encodeURIComponent(prompt);
}

function makePrompt(text, style, i) {
  const mods = [
    "clean sticker",
    "high quality illustration",
    "soft lighting",
    "sharp detail"
  ];
  return `${text}, ${style}, ${mods[i % mods.length]}, variation ${i}`;
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

async function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const t = setTimeout(() => reject("timeout"), 15000);

    img.onload = () => {
      clearTimeout(t);
      resolve(url);
    };

    img.onerror = () => {
      clearTimeout(t);
      reject("fail");
    };

    img.src = url;
  });
}

function generate() {

  const text = document.getElementById("text").value.trim();
  const style = document.getElementById("style").value;

  if (!text) return;

  queue.push({ text, style });

  if (!running) processQueue();
}

async function processQueue() {

  running = true;

  const img = document.getElementById("img");

  while (queue.length > 0) {

    const now = Date.now();

    // 🔥 hard cooldown to avoid AI overload
    const wait = 2200 - (now - lastRun);
    if (wait > 0) await sleep(wait);

    const { text, style } = queue.shift();

    setStatus("Generating...");

    let success = false;

    for (let i = 0; i < 2; i++) {

      try {

        const prompt = makePrompt(text, style, i);
        const url = buildUrl(prompt);

        const result = await loadImage(url);

        img.src = result;
        img.style.display = "block";

        setStatus("Done");

        success = true;
        break;

      } catch (e) {
        await sleep(800); // small backoff before retry
      }
    }

    if (!success) {
      setStatus("AI overloaded — try again");
    }

    lastRun = Date.now();
  }

  running = false;
}

</script>

</body>
</html>
