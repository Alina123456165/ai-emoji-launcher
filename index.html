<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>AI Sticker App</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  body {
    margin: 0;
    font-family: system-ui;
    background: #0b0b0b;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }

  input {
    width: 100%;
    max-width: 360px;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
  }

  button {
    margin-top: 10px;
    padding: 10px 14px;
    border-radius: 10px;
    border: none;
    background: white;
    color: black;
    font-weight: 600;
  }

  #img {
    width: 280px;
    height: 280px;
    margin-top: 14px;
    border-radius: 22px;
    display: none;
    object-fit: cover;
  }

  #status {
    margin-top: 10px;
    opacity: 0.7;
  }

  .gallery {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    overflow-x: auto;
    max-width: 360px;
  }

  .gallery img {
    width: 70px;
    height: 70px;
    border-radius: 10px;
  }
</style>
</head>

<body>

<input id="text" placeholder="type: fire cat, skull, anime dog">

<button onclick="generate()">Generate</button>
<button onclick="regenerate()">Regenerate</button>

<div id="status"></div>

<img id="img">

<div class="gallery" id="gallery"></div>

<script>

let lastPrompt = "";
let lastGoodImage = "";

const styles = [
  "cute sticker clean",
  "anime bold outline sticker",
  "3d glossy sticker render",
  "graffiti street art sticker",
  "minimal flat icon sticker"
];

function pickStyle() {
  return styles[Math.floor(Math.random() * styles.length)];
}

function buildPrompt(text) {
  return `${text}, ${pickStyle()}, centered, high detail, sticker`;
}

function url(prompt) {
  return "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt);
}

function setStatus(t) {
  const el = document.getElementById("status");
  if (el) el.innerText = t;
}

function show(imgUrl) {
  const img = document.getElementById("img");
  img.src = imgUrl;
  img.style.display = "block";
  lastGoodImage = imgUrl;
  save(imgUrl);
}

function generate() {
  try {
    const input = document.getElementById("text");
    const text = input.value.trim();
    if (!text) return;

    lastPrompt = text;

    setStatus("Generating...");

    const prompt = buildPrompt(text + " " + Math.random());
    const imgUrl = url(prompt);

    const test = new Image();

    test.onload = () => {
      show(imgUrl);
      setStatus("Done");
    };

    test.onerror = () => {
      setStatus("Fallback...");
      fallback(text);
    };

    test.src = imgUrl;

  } catch (e) {
    setStatus("Recovered error");
  }
}

function fallback(text) {
  const prompt = `${text}, simple sticker`;
  const imgUrl = url(prompt);

  const img = new Image();

  img.onload = () => {
    show(imgUrl);
    setStatus("Fallback used");
  };

  img.onerror = () => {
    if (lastGoodImage) {
      show(lastGoodImage);
      setStatus("Cached image used");
    } else {
      setStatus("Failed");
    }
  };

  img.src = imgUrl;
}

function regenerate() {
  if (!lastPrompt) return;
  generate();
}

function save(url) {
  try {
    let data = JSON.parse(localStorage.getItem("stickers") || "[]");
    data.unshift(url);
    data = data.slice(0, 10);
    localStorage.setItem("stickers", JSON.stringify(data));
    render();
  } catch {}
}

function render() {
  try {
    const data = JSON.parse(localStorage.getItem("stickers") || "[]");
    const el = document.getElementById("gallery");
    el.innerHTML = "";

    data.forEach(u => {
      const i = document.createElement("img");
      i.src = u;
      el.appendChild(i);
    });
  } catch {}
}

window.addEventListener("load", render);

</script>

</body>
</html>
