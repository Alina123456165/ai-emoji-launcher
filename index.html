<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>AI Sticker Generator</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  body {
    margin: 0;
    font-family: system-ui;
    background: #0b0b0b;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 70px 12px;
  }

  input, select {
    width: 100%;
    max-width: 360px;
    padding: 12px;
    margin-top: 8px;
    border-radius: 10px;
    border: none;
    background: #1a1a1a;
    color: white;
    font-size: 16px;
  }

  button {
    margin-top: 10px;
    padding: 12px 16px;
    border-radius: 10px;
    border: none;
    background: white;
    color: black;
    font-weight: 600;
    font-size: 16px;
  }

  #img {
    width: 280px;
    height: 280px;
    margin-top: 14px;
    border-radius: 18px;
    object-fit: cover;
    background: #111;
  }

  #status {
    margin-top: 10px;
    opacity: 0.7;
    min-height: 20px;
  }
</style>
</head>

<body>

<input id="text" placeholder="type: fire cat, anime skull">

<select id="style">
  <option value="cute sticker, soft lighting">Cute</option>
  <option value="anime style, bold outline">Anime</option>
  <option value="3d render, glossy">3D</option>
  <option value="graffiti street art">Graffiti</option>
  <option value="minimal flat icon">Minimal</option>
</select>

<button onclick="generate()">Generate</button>

<div id="status"></div>

<img id="img">

<script>

let isGenerating = false;

function setStatus(t) {
  document.getElementById("status").innerText = t;
}

function buildUrl(prompt, seed) {
  return "https://image.pollinations.ai/prompt/" +
    encodeURIComponent(prompt + " seed " + seed);
}

function makePrompt(text, style) {
  return `${text}, ${style}, sticker, high detail, clean background`;
}

function fetchImage(url, timeout = 12000) {
  return new Promise((resolve, reject) => {

    const img = new Image();
    const timer = setTimeout(() => {
      reject(new Error("timeout"));
    }, timeout);

    img.onload = () => {
      clearTimeout(timer);
      resolve(url);
    };

    img.onerror = () => {
      clearTimeout(timer);
      reject(new Error("fail"));
    };

    img.src = url;
  });
}

async function generate() {

  if (isGenerating) return;

  const text = document.getElementById("text").value.trim();
  const style = document.getElementById("style").value;
  const img = document.getElementById("img");

  if (!text) return;

  isGenerating = true;
  setStatus("Generating...");

  const prompt = makePrompt(text, style);

  // 🔥 FIRE 3 REQUESTS IN PARALLEL (KEY FIX)
  const requests = [
    buildUrl(prompt, Math.random()),
    buildUrl(prompt, Math.random()),
    buildUrl(prompt, Math.random())
  ];

  let done = false;

  for (let i = 0; i < requests.length; i++) {

    fetchImage(requests[i])
      .then(url => {
        if (done) return;
        done = true;

        img.src = url;
        setStatus("Done");
        isGenerating = false;
      })
      .catch(() => {
        // ignore individual failures
      });
  }

  // 🔥 HARD SAFETY RESET (prevents stuck state forever)
  setTimeout(() => {
    if (!done) {
      setStatus("AI slow — try again");
      isGenerating = false;
    }
  }, 14000);
}

</script>

</body>
</html>
