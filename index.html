<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>AI Sticker App</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  body {
    margin: 0;
    font-family: system-ui;
    background: #0b0b0b;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 70px 12px 20px 12px;
  }

  input, select {
    width: 100%;
    max-width: 360px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 8px;
    font-size: 16px;
    background: #1a1a1a;
    color: white;
  }

  button {
    margin-top: 10px;
    padding: 12px 16px;
    border-radius: 10px;
    border: none;
    background: white;
    color: black;
    font-weight: 600;
    font-size: 16px;
  }

  #img {
    width: 280px;
    height: 280px;
    margin-top: 14px;
    border-radius: 18px;
    display: none;
    object-fit: cover;
    background: #111;
  }

  #status {
    margin-top: 10px;
    opacity: 0.7;
    min-height: 20px;
  }

  /* hidden iframe keeps app-view feel */
  iframe {
    position: absolute;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
    border: none;
  }
</style>
</head>

<body>

<input id="text" placeholder="type: fire cat, anime skull">

<select id="style">
  <option value="cute sticker, soft lighting">Cute</option>
  <option value="anime style, bold outline">Anime</option>
  <option value="3d render, glossy">3D</option>
  <option value="graffiti street art">Graffiti</option>
  <option value="minimal flat icon">Minimal</option>
</select>

<button onclick="generate()">Generate</button>

<div id="status"></div>

<img id="img">

<!-- hidden iframe -->
<iframe src="https://perchance.org/ai-text-to-image-generator"></iframe>

<script>

let isGenerating = false;

function setStatus(text) {
  document.getElementById("status").innerText = text;
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function buildUrl(prompt) {
  return "https://image.pollinations.ai/prompt/" +
    encodeURIComponent(prompt);
}

async function generate() {

  if (isGenerating) {
    setStatus("Please wait...");
    return;
  }

  const text =
    document.getElementById("text").value.trim();

  if (!text) return;

  const style =
    document.getElementById("style").value;

  const img =
    document.getElementById("img");

  isGenerating = true;

  setStatus("Generating...");

  const prompt =
    `${text}, ${style}, sticker, high detail, ${Date.now()}`;

  const url = buildUrl(prompt);

  let finished = false;

  // hidden loader image
  const loader = new Image();

  const timeout = setTimeout(() => {

    if (!finished) {

      finished = true;

      setStatus("AI slow — try again");

      isGenerating = false;
    }

  }, 20000);

  loader.onload = () => {

    if (finished) return;

    finished = true;

    clearTimeout(timeout);

    // only update visible image after successful load
    img.src = url;

    img.style.display = "block";

    setStatus("Done");

    isGenerating = false;
  };

  loader.onerror = async () => {

    if (finished) return;

    finished = true;

    clearTimeout(timeout);

    setStatus("Retrying...");

    await sleep(1200);

    const retryUrl = buildUrl(
      prompt + " detailed " + Math.random()
    );

    img.src = retryUrl;

    img.style.display = "block";

    setStatus("Done");

    isGenerating = false;
  };

  // hidden loader performs actual fetch first
  loader.src = url;
}

</script>

</body>
</html>
