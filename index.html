<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>AI Sticker App</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  body {
    margin: 0;
    font-family: system-ui;
    background: #0b0b0b;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px;
  }

  input {
    width: 100%;
    max-width: 360px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
  }

  button {
    margin-top: 8px;
    padding: 10px 14px;
    border-radius: 10px;
    border: none;
    background: white;
    color: black;
    font-weight: 600;
  }

  #img {
    width: 280px;
    height: 280px;
    margin-top: 12px;
    border-radius: 18px;
    display: none;
    object-fit: cover;
  }

  #status {
    margin-top: 10px;
    opacity: 0.7;
  }

  iframe {
    width: 100%;
    height: 55vh;
    border: none;
    border-radius: 12px;
    margin-top: 12px;
    display: none;
    background: black;
  }

  .row {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
</style>
</head>

<body>

<input id="text" placeholder="type: fire cat, anime skull">

<div class="row">
  <button onclick="generate()">Generate Sticker</button>
  <button onclick="toggleTool()">Toggle Tool</button>
</div>

<div id="status"></div>

<img id="img">

<iframe id="frame"></iframe>

<script>

function generate() {
  const text = document.getElementById("text").value;
  if (!text) return;

  const img = document.getElementById("img");
  const status = document.getElementById("status");

  status.innerText = "Generating...";

  const prompt = `${text}, sticker, clean background, high detail`;
  const url = "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt);

  const test = new Image();

  test.onload = () => {
    img.src = url;
    img.style.display = "block";
    status.innerText = "Done";
  };

  test.onerror = () => {
    status.innerText = "Failed, retrying...";
    img.src = url;
  };

  test.src = url;
}

function toggleTool() {
  const frame = document.getElementById("frame");

  if (frame.style.display === "block") {
    frame.style.display = "none";
    frame.src = "";
    return;
  }

  frame.style.display = "block";

  // IMPORTANT FIX:
  // We only DISPLAY Perchance, we DO NOT rely on it for generation
  frame.src = "https://perchance.org/ai-text-to-image-generator";
}

</script>

</body>
</html>
