<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genmoji AI Text-to-Sticker Studio</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .app-layout {
            display: flex;
            width: 100vw;
            height: 100vh;
        }
        .control-panel {
            width: 360px;
            background-color: #111827;
            border-right: 1px solid #1f2937;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            z-index: 10;
        }
        .branding h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #9ca3af;
        }
        input[type="text"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: #1f2937;
            border: 2px solid #374151;
            border-radius: 0.5rem;
            color: white;
            font-size: 1.1rem;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #feb47b;
        }
        .hints {
            font-size: 0.75rem;
            color: #6b7280;
            line-height: 1.5;
        }
        .hints b {
            color: #ff7e5f;
            cursor: pointer;
            text-decoration: underline;
        }
        .border-slider {
            width: 100%;
            accent-color: #feb47b;
        }
        .export-btn {
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: #0b0f19;
            padding: 1rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: auto;
        }
        .export-btn:hover { opacity: 0.9; }
        
        /* Fullscreen Stage */
        .preview-stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(#1f2937 1px, transparent 1px);
            background-size: 20px 20px;
        }
        #sticker-output {
            max-width: 75vw;
            max-height: 75vh;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.6));
            cursor: pointer;
        }
        #hidden-canvas {
            display: none;
        }
    </style>
</head>
<body>

    <div class="app-layout">
        <div class="control-panel">
            <div class="branding">
                <h1>Genmoji Studio</h1>
                <p style="color: #9ca3af; font-size: 0.85rem;">Converts typed concepts into graphic stickers.</p>
            </div>

            <!-- Text Prompt Input -->
            <div class="input-group">
                <label>Type an Object Name</label>
                <input type="text" id="sticker-text" value="candy" placeholder="Type an item name...">
                <p class="hints">
                    Try typing keywords: <br>
                    <b onclick="applyWord('candy')">candy</b>, 
                    <b onclick="applyWord('cat')">cat</b>, 
                    <b onclick="applyWord('pizza')">pizza</b>, 
                    <b onclick="applyWord('ghost')">ghost</b>, 
                    <b onclick="applyWord('alien')">alien</b>, 
                    <b onclick="applyWord('fire')">fire</b>, 
                    <b onclick="applyWord('rocket')">rocket</b>, 
                    <b onclick="applyWord('heart')">heart</b>, 
                    <b onclick="applyWord('robot')">robot</b>,
                    <b onclick="applyWord('dinosaur')">dinosaur</b>
                </p>
            </div>

            <!-- Sticker Contour Control -->
            <div class="input-group">
                <label>White Border Thickness</label>
                <input type="range" id="border-slider" class="border-slider" min="15" max="50" value="30">
            </div>

            <!-- Save Action Button -->
            <button class="export-btn" id="download-btn">Save Transparent Sticker</button>
        </div>

        <!-- Presentation Viewport (Right-Clickable / Hold to Copy) -->
        <div class="preview-stage">
            <img id="sticker-output" alt="Generated Genmoji Visual Element">
        </div>
    </div>

    <!-- Hidden Pixel Renderer Engine -->
    <canvas id="hidden-canvas" width="600" height="600"></canvas>

    <script>
        const canvas = document.getElementById('hidden-canvas');
        const ctx = canvas.getContext('2d');
        const imgOutput = document.getElementById('sticker-output');
        
        const textInput = document.getElementById('sticker-text');
        const borderSlider = document.getElementById('border-slider');

        // Extended Keyword Dictionary to translate words into actual high-res graphics
        const dictionary = {
            'candy': '🍬',
            'sweets': '🍭',
            'cat': '🐱',
            'dog': '🐶',
            'pizza': '🍕',
            'burger': '🍔',
            'fire': '🔥',
            'ghost': '👻',
            'alien': '👽',
            'heart': '💖',
            'rocket': '🚀',
            'star': '⭐',
            'robot': '🤖',
            'icecream': '🍦',
            'donut': '🍩',
            'skull': '💀',
            'dinosaur': '🦖',
            'dragon': '🐉',
            'clover': '🍀',
            'beer': '🍺',
            'coffee': '☕',
            'car': '🚗',
            'party': '🥳',
            'poop': '💩'
        };

        function generateVisualSticker() {
            const rawInput = textInput.value.toLowerCase().trim();
            const borderSize = parseInt(borderSlider.value);
            
            let visualCharacter = ''; 

            // Logic matching state
            if (dictionary[rawInput]) {
                // If it is in our keyword dictionary, extract the graphic icon matching the word
                visualCharacter = dictionary[rawInput];
            } else if (/\p{Emoji}/u.test(rawInput)) {
                // If they input a raw emoji glyph directly, preserve it 
                visualCharacter = rawInput; 
            } else if (rawInput.length === 0) {
                visualCharacter = '✨';
            } else {
                // Generates dynamic character text string layout only if no match found
                visualCharacter = rawInput; 
            }

            // Flush canvas alpha channel pipeline
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const x = canvas.width / 2;
            const y = canvas.height / 2;

            // Is checking if formatting needs custom text tracking or default emoji grid sizes
            const isWord = visualCharacter.length > 2; 
            let fontSize = isWord ? 80 : 320;

            // Fluid long word handling constraints
            if (isWord && visualCharacter.length > 6) fontSize = 55;
            if (isWord && visualCharacter.length > 10) fontSize = 40;

            // Set up core typographic layout rules
            ctx.font = isWord ? `italic 900 ${fontSize}px system-ui, -apple-system, sans-serif` : `${fontSize}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // --- LAYER 1: Drop Shadow Foundation Boundary ---
            ctx.shadowColor = 'rgba(0, 0, 0, 0.2)';
            ctx.shadowBlur = 12;
            ctx.shadowOffsetY = 6;

            // --- LAYER 2: High Contrast Vector Border Outline ---
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = borderSize * 2;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.strokeText(visualCharacter, x, y);

            // Strip active shadow filters to clear structural layer bleeding
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;
            ctx.strokeText(visualCharacter, x, y); // Double trace path to fill internal vector gaps

            // --- LAYER 3: Core Image Asset Vector Layer ---
            if (isWord) {
                // Custom gradient treatment style specifically applied if string outputs text fallback words
                const gradient = ctx.createLinearGradient(x - 150, y - 50, x + 150, y + 50);
                gradient.addColorStop(0, '#ff7e5f');
                gradient.addColorStop(1, '#feb47b');
                ctx.fillStyle = gradient;
                ctx.fillText(visualCharacter, x, y);
            } else {
                // Render pure graphic data profile directly 
                ctx.fillStyle = '#000000';
                ctx.fillText(visualCharacter, x, y);
            }

            // Convert background vector frames instantly into native click-save image elements
            imgOutput.src = canvas.toDataURL('image/png');
        }

        // Helper interface click handler
        function applyWord(word) {
            textInput.value = word;
            generateVisualSticker();
        }

        // Interactive Application State Hooks
        textInput.addEventListener('input', generateVisualSticker);
        borderSlider.addEventListener('input', generateVisualSticker);
