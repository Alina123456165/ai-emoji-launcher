<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>AI Sticker App</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  body {
    margin: 0;
    font-family: system-ui;
    background: #0b0b0b;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;

    padding: 70px 12px 20px 12px;
  }

  input, select {
    width: 100%;
    max-width: 360px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 8px;
    font-size: 16px;
  }

  button {
    margin-top: 10px;
    padding: 10px 14px;
    border-radius: 10px;
    border: none;
    background: white;
    color: black;
    font-weight: 600;
  }

  #img {
    width: 280px;
    height: 280px;
    margin-top: 12px;
    border-radius: 18px;
    display: none;
    object-fit: cover;
  }

  #status {
    margin-top: 10px;
    opacity: 0.7;
  }

  iframe {
    width: 100%;
    height: 55vh;
    border: none;
    border-radius: 12px;
    margin-top: 12px;
    display: none;
    background: black;
  }
</style>
</head>

<body>

<input id="text" placeholder="type: fire cat, anime skull">

<select id="style">
  <option value="cute sticker, soft lighting">Cute</option>
  <option value="anime style, bold outline">Anime</option>
  <option value="3d render, glossy, high detail">3D</option>
  <option value="graffiti street art">Graffiti</option>
  <option value="minimal flat icon">Minimal</option>
</select>

<button onclick="generate()">Generate</button>
<button onclick="toggleTool()">Toggle Tool</button>

<div id="status"></div>

<img id="img">

<iframe id="frame" src="https://perchance.org/ai-text-to-image-generator"></iframe>

<script>

let isGenerating = false;

function setStatus(t) {
  const el = document.getElementById("status");
  if (el) el.innerText = t;
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

async function generate() {
  if (isGenerating) return;

  const text = document.getElementById("text").value.trim();
  const style = document.getElementById("style").value;
  const img = document.getElementById("img");

  if (!text) return;

  isGenerating = true;
  setStatus("Generating...");

  await sleep(250); // prevents iOS race crash

  const prompt = `${text}, ${style}, sticker, high detail, ${Date.now()}`;
  const url = "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt);

  let done = false;

  const timeout = setTimeout(() => {
    if (!done) {
      setStatus("Still generating... (AI is slow)");
    }
  }, 9000);

  const test = new Image();

  test.onload = () => {
    done = true;
    clearTimeout(timeout);

    img.src = url;
    img.style.display = "block";

    setStatus("Done");
    isGenerating = false;
  };

  test.onerror = async () => {
    await sleep(1200);

    if (!done) {
      setStatus("Retrying...");

      const retryUrl =
        "https://image.pollinations.ai/prompt/" +
        encodeURIComponent(prompt + " high quality");

      img.src = retryUrl;
    }

    isGenerating = false;
  };

  test.src = url;
}

function toggleTool() {
  const frame = document.getElementById("frame");

  if (frame.style.display === "block") {
    frame.style.display = "none";
    return;
  }

  frame.style.display = "block";
}

</script>

</body>
</html>
