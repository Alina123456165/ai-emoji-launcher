<script>

let lastPrompt = "";
let lastGoodImage = "";

const styles = [
  "cute sticker, clean background, soft lighting",
  "anime sticker, sharp outline, vibrant colors",
  "3d render sticker, ultra detailed, glossy",
  "graffiti sticker, bold street art style",
  "minimal icon sticker, flat design, centered"
];

function randomStyle() {
  return styles[Math.floor(Math.random() * styles.length)];
}

function buildPrompt(text) {
  return `${text}, ${randomStyle()}, high detail, sticker, centered composition`;
}

function generateUrl(prompt) {
  return "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt);
}

function loadImage(prompt, onSuccess, onFail) {
  const img = document.getElementById("img");
  const status = document.getElementById("status");

  status.innerText = "Generating...";

  const url = generateUrl(prompt);

  const temp = new Image();

  temp.onload = () => {
    img.src = url;
    img.style.display = "block";
    lastGoodImage = url;

    status.innerText = "Done";
    save(url);

    if (onSuccess) onSuccess();
  };

  temp.onerror = () => {
    if (onFail) onFail();
  };

  temp.src = url;
}

async function generate() {
  const text = document.getElementById("text").value;
  if (!text) return;

  lastPrompt = text;

  let attempts = 0;

  function tryNext() {
    if (attempts >= 4) {
      const status = document.getElementById("status");

      // fallback: show last good image instead of blank
      if (lastGoodImage) {
        document.getElementById("img").src = lastGoodImage;
        document.getElementById("img").style.display = "block";
        status.innerText = "Using last working image";
      } else {
        status.innerText = "All AI attempts failed";
      }

      return;
    }

    attempts++;

    const prompt = buildPrompt(text + " variation " + Math.random());

    loadImage(
      prompt,
      () => {},
      () => tryNext()
    );
  }

  tryNext();
}

function regenerate() {
  if (!lastPrompt) return;
  generate();
}

function save(url) {
  let data = JSON.parse(localStorage.getItem("stickers") || "[]");
  data.unshift(url);
  data = data.slice(0, 12);
  localStorage.setItem("stickers", JSON.stringify(data));
  render();
}

function render() {
  const data = JSON.parse(localStorage.getItem("stickers") || "[]");
  const el = document.getElementById("gallery");
  el.innerHTML = "";

  data.forEach(url => {
    const img = document.createElement("img");
    img.src = url;
    el.appendChild(img);
  });
}

render();

</script>
