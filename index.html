<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genmoji Sticker Generator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .app-layout {
            display: flex;
            width: 100vw;
            height: 100vh;
        }
        .control-panel {
            width: 360px;
            background-color: #111827;
            border-right: 1px solid #1f2937;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            z-index: 10;
        }
        .branding h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #9ca3af;
        }
        input[type="text"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: #1f2937;
            border: 2px solid #374151;
            border-radius: 0.5rem;
            color: white;
            font-size: 1.1rem;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #feb47b;
        }
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
            background: #1f2937;
            padding: 0.5rem;
            border-radius: 0.5rem;
        }
        .emoji-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 0.25rem;
        }
        .emoji-btn:hover {
            background-color: #374151;
        }
        .color-pickers {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }
        .color-node {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #1f2937;
            padding: 0.5rem;
            border-radius: 0.5rem;
        }
        input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            cursor: pointer;
            background: none;
        }
        .export-btn {
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: #0b0f19;
            padding: 1rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: auto;
        }
        .export-btn:hover { opacity: 0.9 stroke; }
        
        /* Fullscreen Stage */
        .preview-stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(#1f2937 1px, transparent 1px);
            background-size: 20px 20px;
        }
        /* Crucial: Keeping image sharp and click-saveable */
        #sticker-output {
            max-width: 80vw;
            max-height: 80vh;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            cursor: pointer;
        }
        #hidden-canvas {
            display: none;
        }
    </style>
</head>
<body>

    <div class="app-layout">
        <div class="control-panel">
            <div class="branding">
                <h1>Genmoji Maker</h1>
                <p style="color: #9ca3af; font-size: 0.85rem;">Right-click image to save instantly</p>
            </div>

            <!-- Text Input -->
            <div class="input-group">
                <label>Sticker Text</label>
                <input type="text" id="sticker-text" value="OMG!" placeholder="Type here...">
            </div>

            <!-- Quick Emoji Adders -->
            <div class="input-group">
                <label>Tap to Add Emoji</label>
                <div class="emoji-grid">
                    <button class="emoji-btn" onclick="addEmoji('🔥')">🔥</button>
                    <button class="emoji-btn" onclick="addEmoji('✨')">✨</button>
                    <button class="emoji-btn" onclick="addEmoji('💀')">💀</button>
                    <button class="emoji-btn" onclick="addEmoji('👑')">👑</button>
                    <button class="emoji-btn" onclick="addEmoji('💯')">💯</button>
                    <button class="emoji-btn" onclick="addEmoji('🚀')">🚀</button>
                    <button class="emoji-btn" onclick="addEmoji('💖')">💖</button>
                    <button class="emoji-btn" onclick="addEmoji('👽')">👽</button>
                    <button class="emoji-btn" onclick="addEmoji('✌️')">✌️</button>
                    <button class="emoji-btn" onclick="addEmoji('🎨')">🎨</button>
                </div>
            </div>

            <!-- Gradient Customizer -->
            <div class="input-group">
                <label>Text Gradient</label>
                <div class="color-pickers">
                    <div class="color-node">
                        <input type="color" id="color1" value="#ff007f">
                    </div>
                    <div class="color-node">
                        <input type="color" id="color2" value="#ffaa00">
                    </div>
                </div>
            </div>

            <!-- Download Button Trigger -->
            <button class="export-btn" id="download-btn">Save Transparent PNG</button>
        </div>

        <!-- Right Side: Clean Presenter Element -->
        <div class="preview-stage">
            <!-- This is a real <img> tag. You can right click -> Save Image As directly! -->
            <img id="sticker-output" alt="Your generated Genmoji sticker">
        </div>
    </div>

    <!-- Hidden calculation engine -->
    <canvas id="hidden-canvas" width="800" height="800"></canvas>

    <script>
        const canvas = document.getElementById('hidden-canvas');
        const ctx = canvas.getContext('2d');
        const imgOutput = document.getElementById('sticker-output');
        
        const textInput = document.getElementById('sticker-text');
        const color1Input = document.getElementById('color1');
        const color2Input = document.getElementById('color2');

        function generateSticker() {
            const text = textInput.value || " ";
            
            // Clear to pure transparency
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dynamically scale text size based on length
            let fontSize = 160;
            if (text.length > 4) fontSize = 120;
            if (text.length > 8) fontSize = 80;

            ctx.font = `italic 900 ${fontSize}px system-ui, -apple-system, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            const x = canvas.width / 2;
            const y = canvas.height / 2;

            // Step 1: Draw thick white sticker contour background border
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 36;
            ctx.lineJoin = 'round';
            ctx.miterLimit = 2;
            ctx.strokeText(text, x, y);

            // Step 2: Overlay a clean, sharp inner text gradient layout
            const gradient = ctx.createLinearGradient(x - 200, y - 100, x + 200, y + 100);
            gradient.addColorStop(0, color1Input.value);
            gradient.addColorStop(1, color2Input.value);
            
            ctx.fillStyle = gradient;
            ctx.fillText(text, x, y);

            // Step 3: Convert canvas to live saving source inside <img> tag
            const dataUrl = canvas.toDataURL('image/png');
            imgOutput.src = dataUrl;
        }

        function addEmoji(emoji) {
            textInput.value += emoji;
            generateSticker();
        }

        // Live Event Listeners
        textInput.addEventListener('input', generateSticker);
        color1Input.addEventListener('input', generateSticker);
        color2Input.addEventListener('input', generateSticker);

        // Native Downloader Hook
        document.getElementById('download-btn').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'genmoji-sticker.png';
            link.href = imgOutput.src;
            link.click();
        });

        // Initial Boot Render
        generateSticker();
    </script>
</body>
</html>
