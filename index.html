<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Hardened viewport prevents forced user-scaling and clipping on mobile Safari screens -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Genmoji Sticker Studio</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* Disables standard touch highlight overlays on iOS click targets */
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
            height: 100vh;
            /* Supports safe areas around iPhone notches and dynamic islands */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Mobile-First Responsive Layout Grid */
        .app-layout {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100%;
        }

        /* Fullscreen Stage UI Viewport */
        .preview-stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(#1f2937 1px, transparent 1px);
            background-size: 20px 20px;
            position: relative;
            padding: 1rem;
        }
        
        /* Targets the image container to pop open Apple's native photo action overlay */
        #sticker-output {
            max-width: 85vw;
            max-height: 50vh;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.5));
            display: block;
            cursor: pointer;
            /* Enables native long-press save menu behavior in mobile Safari */
            -webkit-touch-callout: default !important;
            pointer-events: auto;
            user-select: none;
        }

        /* Bottom Dashboard Controller docked for easy thumb reach on mobile */
        .control-panel {
            width: 100vw;
            background-color: #111827;
            border-top: 1px solid #1f2937;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.5);
        }
        .branding {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .branding h1 {
            font-size: 1.25rem;
            font-weight: 800;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .instructions {
            font-size: 0.75rem;
            color: #9ca3af;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        
        /* Fixed input at 16px to completely bypass forced Safari keyboard zooming */
        input[type="text"] {
            width: 100%;
            padding: 0.85rem 1rem;
            background-color: #1f2937;
            border: 2px solid #374151;
            border-radius: 0.75rem;
            color: white;
            font-size: 16px; 
            outline: none;
            -webkit-appearance: none;
        }
        input[type="text"]:focus {
            border-color: #feb47b;
        }
        .gen-btn {
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: #0b0f19;
            padding: 1rem;
            border: none;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            text-align: center;
        }
        .gen-btn:active {
            opacity: 0.85;
        }
        #hidden-canvas { display: none; }

        /* Media adjustments scaling cleanly back to side-by-side grids on Desktop viewports */
        @media (min-width: 768px) {
            body { flex-direction: row; }
            .app-layout { flex-direction: row; }
            .control-panel { width: 360px; height: 100vh; border-top: none; border-right: 1px solid #1f2937; }
            #sticker-output { max-width: 70vw; max-height: 75vh; }
        }
    </style>
</head>
<body>

    <div class="app-layout">
        <!-- Render Viewport Section -->
        <div class="preview-stage">
            <img id="sticker-output" alt="Tap and hold to save to camera roll">
        </div>

        <!-- Controller Dashboard docked to base on phone layouts -->
        <div class="control-panel">
            <div class="branding">
                <h1>Genmoji Studio</h1>
                <span class="instructions">Long-press image to Save</span>
            </div>

            <div class="input-group">
                <input type="text" id="prompt-input" value="" placeholder="Type candy, pizza, cat, alien..." autocomplete="off" autocapitalize="off" autocorrect="off">
            </div>

            <button class="gen-btn" id="generate-btn">Generate Sticker</button>
        </div>
    </div>

    <!-- Background Composite Processor Canvas -->
    <canvas id="hidden-canvas" width="600" height="600"></canvas>
