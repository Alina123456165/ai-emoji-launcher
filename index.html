<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Sticker App + Tools</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  body {
    margin: 0;
    font-family: system-ui;
    background: #0b0b0b;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }

  h1 {
    font-size: 18px;
  }

  input {
    width: 100%;
    max-width: 360px;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    margin-top: 10px;
  }

  button {
    padding: 10px 14px;
    border-radius: 10px;
    border: none;
    background: white;
    color: black;
    font-weight: 600;
    margin: 6px;
  }

  #img {
    width: 280px;
    height: 280px;
    border-radius: 22px;
    margin-top: 14px;
    display: none;
    object-fit: cover;
  }

  #status {
    margin-top: 10px;
    opacity: 0.6;
  }

  iframe {
    width: 100%;
    height: 60vh;
    border: none;
    border-radius: 12px;
    margin-top: 12px;
    display: none;
    background: black;
  }

  .row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
</style>
</head>

<body>

<h1>Sticker Generator</h1>

<input id="text" placeholder="type: fire cat, skull, anime dog">

<div class="row">
  <button onclick="generate()">Generate</button>
  <button onclick="toggleTools()">Tools</button>
</div>

<div id="status"></div>

<img id="img">

<iframe id="frame"></iframe>

<script>
let toolsOpen = false;

function generate() {
  const text = document.getElementById("text").value;
  if (!text) return;

  const img = document.getElementById("img");
  const status = document.getElementById("status");

  status.innerText = "Generating...";

  const prompt = text + ", sticker, clean background, high detail";
  const url = "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt);

  img.src = url;
  img.style.display = "block";

  img.onload = () => status.innerText = "Done";
}

function toggleTools() {
  const frame = document.getElementById("frame");

  toolsOpen = !toolsOpen;

  if (toolsOpen) {
    frame.style.display = "block";

    // TRY iframe load
    frame.src = "https://perchance.org/ai-text-to-image-generator";

    // fallback safety (if iframe breaks)
    setTimeout(() => {
      if (!frame.contentDocument) {
        window.open(frame.src, "_blank");
      }
    }, 1500);

  } else {
    frame.style.display = "none";
    frame.src = "";
  }
}
</script>

</body>
</html>
