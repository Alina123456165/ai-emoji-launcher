<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stable AI Genmoji Studio</title>
    <!-- Puter.js official free cloud orchestration script -->
    <script src="https://puter.com"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .app-layout {
            display: flex;
            width: 100vw;
            height: 100vh;
        }
        .control-panel {
            width: 360px;
            background-color: #111827;
            border-right: 1px solid #1f2937;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            z-index: 10;
        }
        .branding h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #9ca3af;
        }
        input[type="text"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: #1f2937;
            border: 2px solid #374151;
            border-radius: 0.5rem;
            color: white;
            font-size: 1.1rem;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #feb47b;
        }
        .gen-btn {
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: #0b0f19;
            padding: 1rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .gen-btn:hover { opacity: 0.9; }
        .gen-btn:disabled {
            background: #374151;
            color: #9ca3af;
            cursor: not-allowed;
        }
        .status-msg {
            font-size: 0.85rem;
            color: #feb47b;
            text-align: center;
            min-height: 20px;
        }
        
        /* Fullscreen Stage UI */
        .preview-stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(#1f2937 1px, transparent 1px);
            background-size: 20px 20px;
            position: relative;
        }
        #sticker-output {
            max-width: 75vw;
            max-height: 75vh;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.6));
            display: none;
            cursor: pointer;
        }
        /* Loader Spinner */
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #1f2937;
            border-top: 5px solid #feb47b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #hidden-canvas { display: none; }
    </style>
</head>
<body>

    <div class="app-layout">
        <div class="control-panel">
            <div class="branding">
                <h1>Genmoji Engine v2</h1>
                <p style="color: #9ca3af; font-size: 0.85rem;">Stable Multi-Generation Sticker App</p>
            </div>

            <!-- Sticker Prompt Input -->
            <div class="input-group">
                <label>What sticker do you want?</label>
                <input type="text" id="prompt-input" value="candy" placeholder="e.g., candy, hamburger, laser wolf...">
            </div>

            <!-- Interactive Trigger Elements -->
            <button class="gen-btn" id="generate-btn">Generate AI Sticker</button>
            <div class="status-msg" id="status-text">Ready to generate.</div>

            <p style="color: #6b7280; font-size: 0.75rem; margin-top: auto; line-height: 1.4;">
                💡 <b>How to save:</b> Right-click or long-press directly on the final image sticker to copy or save it as a true transparent PNG file!
            </p>
        </div>

        <!-- Fullscreen Presentation Viewport Frame -->
        <div class="preview-stage">
            <div class="spinner" id="loading-spinner"></div>
            <!-- The Native Right-Click Save Target -->
            <img id="sticker-output" alt="Your Generated Transparent AI Sticker">
        </div>
    </div>

    <!-- Background Layer Mask Processing Pipeline Canvas -->
    <canvas id="hidden-canvas" width="512" height="512"></canvas>

    <script>
        const promptInput = document.getElementById('prompt-input');
        const generateBtn = document.getElementById('generate-btn');
        const statusText = document.getElementById('status-text');
        const spinner = document.getElementById('loading-spinner');
        const imgOutput = document.getElementById('sticker-output');
        
        const canvas = document.getElementById('hidden-canvas');
        const ctx = canvas.getContext('2d');

        async function generateAISticker() {
            const userPrompt = promptInput.value.trim();
            if (!userPrompt) return alert("Please type an object name!");

            // Update loading UI states
            generateBtn.disabled = true;
            spinner.style.display = "block";
            imgOutput.style.display = "none";
            statusText.textContent = "AI engine is drawing...";

            // Direct engineering instruction ensuring flat items render over deep black walls
            const structuredPrompt = `${userPrompt}, cute isolated 3D emoji sticker layout vector graphic, centered single object, solid completely black background, high resolution 3d asset style`;

            try {
                // Official cloud API execution - bypasses rate limits and scraping crashes
                const imageResult = await puter.ai.txt2img(structuredPrompt);
                
                const img = new Image();
                img.crossOrigin = "anonymous"; // Keeps local canvas clean from origin locks
                img.src = imageResult.src;

                img.onload = function() {
                    statusText.textContent = "Isolating background alpha and cutting vinyl strokes...";
                    processStickerLayers(img);
                };

                img.onerror = function() {
                    throw new Error("Local graphic streaming compilation failed.");
                };

            } catch (error) {
                console.error(error);
                statusText.textContent = "Processing failed. Try hitting generate again.";
                generateBtn.disabled = false;
                spinner.style.display = "none";
            }
        }

        function processStickerLayers(aiImage) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. Map raw image into background computing buffers
            ctx.drawImage(aiImage, 0, 0, canvas.width, canvas.height);
            
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;

            // 2. CHROMA KEY PARSER: Wipe away black pixels to create true transparent channels
            for (let i = 0; i < data.length; i += 4) {
                let r = data[i];
                let g = data[i + 1];
                let b = data[i + 2];
                
                // If pixel color maps near dark thresholds, force alpha transparency to zero
                if (r < 55 && g < 55 && b < 55) {
                    data[i + 3] = 0; 
                }
            }
            
            ctx.putImageData(imgData, 0, 0);

            // Copy stripped asset array context out to a standalone masking clone layer
            const cutOutCanvas = document.createElement('canvas');
            cutOutCanvas.width = canvas.width;
            cutOutCanvas.height = canvas.height;
            const cutOutCtx = cutOutCanvas.getContext('2d');
            cutOutCtx.drawImage(canvas, 0, 0);

            // 3. VINYL DIE-CUT ENGINE: Stitches white outline frames around graphic boundaries
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.shadowColor = 'rgba(0, 0, 0, 0.35)';
            ctx.shadowBlur = 12;
            ctx.shadowOffsetY = 6;

            // Sweeps 360 degrees stamping white shadow profiles to construct a unified thick boundary line
            const thickness = 14; 
            for (let angle = 0; angle < 360; angle += 15) {
                const dx = Math.cos(angle * Math.PI / 180) * thickness;
                const dy = Math.sin(angle * Math.PI / 180) * thickness;
                ctx.drawImage(cutOutCanvas, dx, dy);
            }

            // Locks global canvas pixels to flood-fill the background mask solid white
            ctx.globalCompositeOperation = 'source-in';
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Revert composite rules back to default placement hierarchies
            ctx.globalCompositeOperation = 'source-over';
            ctx.shadowColor = 'transparent';
