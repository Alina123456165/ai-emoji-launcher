<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stable AI Sticker Generator</title>

<style>
  body {
    margin: 0;
    font-family: system-ui;
    background: #0b0b0b;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 70px 12px;
  }

  input, select {
    width: 100%;
    max-width: 360px;
    padding: 12px;
    margin-top: 8px;
    border-radius: 10px;
    border: none;
    background: #1a1a1a;
    color: white;
  }

  button {
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: white;
    font-weight: bold;
  }

  #img {
    width: 280px;
    height: 280px;
    margin-top: 14px;
    border-radius: 18px;
    object-fit: cover;
    background: #111;
  }

  #status {
    margin-top: 10px;
    opacity: 0.7;
  }
</style>
</head>

<body>

<input id="text" placeholder="type: fire cat, anime skull">

<select id="style">
  <option value="cute sticker, soft lighting">Cute</option>
  <option value="anime style, bold outline">Anime</option>
  <option value="3d render, glossy">3D</option>
  <option value="graffiti street art">Graffiti</option>
  <option value="minimal flat icon">Minimal</option>
</select>

<button onclick="generate()">Generate</button>

<div id="status"></div>

<img id="img">

<script>

let isGenerating = false;

function setStatus(t) {
  document.getElementById("status").innerText = t;
}

function buildUrl(prompt) {
  return "https://image.pollinations.ai/prompt/" +
    encodeURIComponent(prompt);
}

function makePrompt(text, style, attempt) {
  const mods = [
    "high detail sticker",
    "clean background",
    "soft lighting",
    "sharp illustration"
  ];

  const mod = mods[attempt % mods.length];

  return `${text}, ${style}, ${mod}, variation ${attempt}, ${Date.now()}`;
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

async function loadImage(url, timeout = 15000) {

  return new Promise((resolve, reject) => {

    const img = new Image();
    const t = setTimeout(() => reject("timeout"), timeout);

    img.onload = () => {
      clearTimeout(t);
      resolve(url);
    };

    img.onerror = () => {
      clearTimeout(t);
      reject("fail");
    };

    img.src = url;
  });
}

async function generate() {

  if (isGenerating) return;

  const text = document.getElementById("text").value.trim();
  const style = document.getElementById("style").value;
  const img = document.getElementById("img");

  if (!text) return;

  isGenerating = true;

  setStatus("Generating...");

  let success = false;

  // 🔥 SEQUENTIAL RETRIES (NO OVERLOAD)
  for (let i = 0; i < 3; i++) {

    try {

      const prompt = makePrompt(text, style, i);
      const url = buildUrl(prompt);

      const result = await loadImage(url);

      img.src = result;
      setStatus("Done");

      success = true;
      break;

    } catch (e) {

      setStatus("Retrying...");
      await sleep(1200); // IMPORTANT cooldown

    }
  }

  if (!success) {
    setStatus("AI overloaded — wait a few seconds and try again");
  }

  // cooldown between full generations
  await sleep(1500);

  isGenerating = false;
}

</script>

</body>
</html>
