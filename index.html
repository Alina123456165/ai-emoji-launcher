<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Genmoji Sticker Studio</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .app-layout {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .preview-stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(#1f2937 1px, transparent 1px);
            background-size: 20px 20px;
            padding: 1rem;
            min-height: 0;
        }
        
        #sticker-output {
            max-width: 90vw;
            max-height: 55vh;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.6));
            display: block;
            -webkit-touch-callout: default !important;
            pointer-events: auto;
            user-select: none;
        }

        .control-panel {
            width: 100vw;
            background-color: #111827;
            border-top: 1px solid #1f2937;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.5);
            z-index: 100;
        }
        .branding {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .branding h1 {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .instructions {
            font-size: 0.75rem;
            color: #9ca3af;
        }
        .input-group {
            width: 100%;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 0.85rem 1rem;
            background-color: #1f2937;
            border: 2px solid #374151;
            border-radius: 0.75rem;
            color: white;
            font-size: 16px; 
            outline: none;
            -webkit-appearance: none;
        }
        input[type="text"]:focus {
            border-color: #feb47b;
        }
        .gen-btn {
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: #0b0f19;
            padding: 0.9rem;
            border: none;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            text-align: center;
        }
        .gen-btn:active {
            opacity: 0.85;
        }
        #hidden-canvas { display: none; }
    </style>
</head>
<body>

    <div class="app-layout">
        <!-- Render Stage -->
        <div class="preview-stage">
            <img id="sticker-output" alt="Sticker Preview">
        </div>

        <!-- Touch Controls -->
        <div class="control-panel">
            <div class="branding">
                <h1>Genmoji Studio</h1>
                <span class="instructions">Hold image to Save</span>
            </div>

            <!-- Box layout explicitly empty to stop form session storage -->
            <div class="input-group">
                <input type="text" id="prompt-input" value="" placeholder="Type anything here..." autocomplete="off" autocapitalize="off" autocorrect="off">
            </div>

            <button class="gen-btn" id="generate-btn">Generate Sticker</button>
        </div>
    </div>

    <!-- Background Engine Canvas -->
    <canvas id="hidden-canvas" width="600" height="600"></canvas>

    <script>
        const promptInput = document.getElementById('prompt-input');
        const generateBtn = document.getElementById('generate-btn');
        const imgOutput = document.getElementById('sticker-output');
        const canvas = document.getElementById('hidden-canvas');
        const ctx = canvas.getContext('2d');

        // Hard code clear values on page launch tracking loops to completely wipe browser autofill
        window.addEventListener('DOMContentLoaded', () => {
            promptInput.value = '';
            generateInitialPlaceholder();
        });

        const assetLibrary = {
            'candy': (c) => {
                c.beginPath(); c.moveTo(180, 260); c.lineTo(130, 200); c.lineTo(130, 320); c.closePath(); c.fill(); c.stroke();
                c.beginPath(); c.moveTo(420, 260); c.lineTo(470, 200); c.lineTo(470, 320); c.closePath(); c.fill(); c.stroke();
                c.beginPath(); c.arc(300, 260, 100, 0, Math.PI * 2); c.fill(); c.stroke();
                c.strokeStyle = '#ffffff'; c.lineWidth = 10; c.beginPath(); c.arc(300, 260, 50, 0, Math.PI, false); c.stroke();
            },
            'pizza': (c) => {
                c.beginPath(); c.moveTo(300, 110); c.lineTo(440, 410); c.lineTo(160, 410); c.closePath(); c.fill(); c.stroke();
                c.fillStyle = '#ff416c';
                c.beginPath(); c.arc(300, 250, 22, 0, Math.PI * 2); c.fill();
                c.beginPath(); c.arc(260, 340, 22, 0, Math.PI * 2); c.fill();
                c.beginPath(); c.arc(350, 330, 22, 0, Math.PI * 2); c.fill();
            },
            'cat': (c) => {
                c.beginPath(); c.arc(300, 290, 110, 0, Math.PI * 2); c.fill(); c.stroke();
                c.beginPath(); c.moveTo(200, 230); c.lineTo(170, 120); c.lineTo(260, 200); c.closePath(); c.fill(); c.stroke();
                c.beginPath(); c.moveTo(400, 230); c.lineTo(430, 120); c.lineTo(340, 200); c.closePath(); c.fill(); c.stroke();
                c.fillStyle = '#ffffff'; c.beginPath(); c.arc(260, 270, 18, 0, Math.PI * 2); c.fill(); c.beginPath(); c.arc(340, 270, 18, 0, Math.PI * 2); c.fill();
                c.fillStyle = '#000000'; c.beginPath(); c.arc(260, 270, 8, 0, Math.PI * 2); c.fill(); c.beginPath(); c.arc(340, 270, 8, 0, Math.PI * 2); c.fill();
            },
            'alien': (c) => {
                c.beginPath(); c.ellipse(300, 270, 120, 150, 0, 0, Math.PI * 2); c.fill(); c.stroke();
                c.fillStyle = '#0b0f19';
                c.save(); c.translate(240, 250); c.rotate(-Math.PI / 6); c.beginPath(); c.ellipse(0, 0, 30, 60, 0, 0, Math.PI * 2); c.fill(); c.restore();
                c.save(); c.translate(360, 250); c.rotate(Math.PI / 6); c.beginPath(); c.ellipse(0, 0, 30, 60, 0, 0, Math.PI * 2); c.fill(); c.restore();
            }
        };

        // Renders a clean visual prompt icon on screen initialization before anything is typed
        function generateInitialPlaceholder() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 24;
            ctx.lineJoin = 'round';
            ctx.fillStyle = '#ffffff';
            ctx.font = 'italic 900 80px system-ui, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.strokeText("?", canvas.width/2, canvas.height/2);
            ctx.fillText("?", canvas.width/2, canvas.height/2);
            ctx.restore();
            imgOutput.src = canvas.toDataURL('image/png');
        }

        function generateSticker() {
            const word = promptInput.value.toLowerCase().trim();
            if(!word) return; // Ignore button press if field content is completely blank
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const x = canvas.width / 2;
            const y = canvas.height / 2;
            const gradient = ctx.createLinearGradient(100, 100, 500, 500);
            gradient.addColorStop(0, '#ff7e5f');
            gradient.addColorStop(1, '#feb47b');

            // Pass 1: White vinyl shape background silhouette bounds 
            ctx.save();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 32;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.fillStyle = '#ffffff';
            ctx.shadowColor = 'rgba(0, 0, 0, 0.4)';
            ctx.shadowBlur = 15;
            ctx.shadowOffsetY = 8;

            if (assetLibrary[word]) {
                assetLibrary[word](ctx);
            } else {
                ctx.font = 'italic 900 100px system-ui, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.strokeText(word, x, y);
                ctx.fillText(word, x, y);
            }
            ctx.restore();

            // Pass 2: Colorful gradient artwork detail layers
            ctx.save();
            ctx.fillStyle = gradient;
            ctx.strokeStyle = '#111827';
            ctx.lineWidth = 12;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            if (assetLibrary[word]) {
                assetLibrary[word](ctx);
            } else {
                ctx.font = 'italic 900 100px system-ui, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.strokeText(word, x, y);
                ctx.fillText(word, x, y);
            }
            ctx.restore();

            imgOutput.src = canvas.toDataURL('image/png');
            document.activeElement.blur();
        }
