<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>AI Sticker App</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- SPEED BOOST -->
<link rel="preconnect" href="https://image.pollinations.ai">

<style>
  body {
    margin: 0;
    font-family: system-ui;
    background: #0b0b0b;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 70px 12px 20px 12px;
  }

  input, select {
    width: 100%;
    max-width: 360px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 8px;
    font-size: 16px;
    background: #1a1a1a;
    color: white;
  }

  button {
    margin-top: 10px;
    padding: 12px 16px;
    border-radius: 10px;
    border: none;
    background: white;
    color: black;
    font-weight: 600;
    font-size: 16px;
  }

  #img {
    width: 280px;
    height: 280px;
    margin-top: 14px;
    border-radius: 18px;
    object-fit: cover;
    display: none;
    background: #111;
  }

  #status {
    margin-top: 10px;
    opacity: 0.7;
    min-height: 20px;
  }

  iframe {
    position: absolute;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
    border: none;
  }
</style>
</head>

<body>

<input id="text" placeholder="type: fire cat, anime skull">

<select id="style">
  <option value="cute sticker, soft lighting">Cute</option>
  <option value="anime style, bold outline">Anime</option>
  <option value="3d render, glossy">3D</option>
  <option value="graffiti street art">Graffiti</option>
  <option value="minimal flat icon">Minimal</option>
</select>

<button onclick="generate()">Generate</button>

<div id="status"></div>

<img id="img">

<iframe src="https://perchance.org/ai-text-to-image-generator"></iframe>

<script>

let isGenerating = false;
let currentBlobUrl = null;

function setStatus(t) {
  document.getElementById("status").innerText = t;
}

function buildUrl(prompt) {
  return "https://image.pollinations.ai/prompt/" +
    encodeURIComponent(prompt);
}

async function fetchImage(url) {
  const res = await fetch(url, { cache: "no-store" });

  if (!res.ok) throw new Error("bad response");

  const blob = await res.blob();

  // faster + less false rejections
  if (blob.size < 1500) {
    throw new Error("invalid image");
  }

  return blob;
}

async function generate() {

  if (isGenerating) {
    setStatus("Please wait...");
    return;
  }

  const text =
    document.getElementById("text").value.trim();

  if (!text) return;

  const style =
    document.getElementById("style").value;

  const img =
    document.getElementById("img");

  isGenerating = true;

  setStatus("Generating...");

  const prompt =
    `${text}, ${style}, sticker, high detail, ${Date.now()} ${Math.random()}`;

  const urls = [
    buildUrl(prompt),
    buildUrl(prompt + " variation"),
    buildUrl(prompt + " high quality")
  ];

  let success = false;

  for (const url of urls) {

    try {

      // 🔥 faster pacing
      await new Promise(r => setTimeout(r, 120));

      const blob = await fetchImage(url);

      if (currentBlobUrl) {
        URL.revokeObjectURL(currentBlobUrl);
      }

      const blobUrl = URL.createObjectURL(blob);

      currentBlobUrl = blobUrl;

      img.style.display = "none";
      img.removeAttribute("src");

      void img.offsetHeight;

      img.src = blobUrl;
      img.style.display = "block";

      setStatus("Done");

      success = true;
      break;

    } catch (e) {
      // silently try next
    }
  }

  if (!success) {
    setStatus("AI overloaded — try again");
  }

  isGenerating = false;
}

</script>

</body>
</html>
