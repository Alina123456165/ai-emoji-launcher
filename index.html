<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Genmoji Sticker Studio</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .app-layout {
            display: flex;
            width: 100vw;
            height: 100vh;
        }
        .control-panel {
            width: 360px;
            background-color: #111827;
            border-right: 1px solid #1f2937;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            z-index: 10;
        }
        .branding h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #9ca3af;
        }
        input[type="text"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: #1f2937;
            border: 2px solid #374151;
            border-radius: 0.5rem;
            color: white;
            font-size: 1.1rem;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #feb47b;
        }
        .gen-btn {
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: #0b0f19;
            padding: 1rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .gen-btn:hover { opacity: 0.9; }
        .gen-btn:disabled {
            background: #374151;
            color: #9ca3af;
            cursor: not-allowed;
        }
        .status-msg {
            font-size: 0.85rem;
            color: #feb47b;
            text-align: center;
            min-height: 20px;
        }
        .hints {
            font-size: 0.75rem;
            color: #6b7280;
            line-height: 1.5;
        }
        .hints b {
            color: #ff7e5f;
            cursor: pointer;
            text-decoration: underline;
        }
        
        /* Fullscreen Stage UI Layout */
        .preview-stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(#1f2937 1px, transparent 1px);
            background-size: 20px 20px;
            position: relative;
        }
        #sticker-output {
            max-width: 75vw;
            max-height: 75vh;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.6));
            display: none;
            cursor: pointer;
        }
        /* Loader Spinner Configuration */
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #1f2937;
            border-top: 5px solid #feb47b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #hidden-canvas { display: none; }
    </style>
</head>
<body>

    <div class="app-layout">
        <div class="control-panel">
            <div class="branding">
                <h1>Genmoji Engine v3</h1>
                <p style="color: #9ca3af; font-size: 0.85rem;">True Isolated AI Image Sticker Generator</p>
            </div>

            <!-- Input Box prompt form field -->
            <div class="input-group">
                <label>What sticker do you want?</label>
                <input type="text" id="prompt-input" value="candy" placeholder="Type a word...">
                <p class="hints">
                    Quick words: 
                    <b onclick="quickFill('candy')">candy</b>, 
                    <b onclick="quickFill('pizza')">pizza</b>, 
                    <b onclick="quickFill('cute cat')">cat</b>, 
                    <b onclick="quickFill('robot')">robot</b>, 
                    <b onclick="quickFill('fire monster')">fire</b>
                </p>
            </div>

            <!-- Generate Button Interface elements -->
            <button class="gen-btn" id="generate-btn">Generate AI Sticker</button>
            <div class="status-msg" id="status-text">Ready to run.</div>

            <p style="color: #6b7280; font-size: 0.75rem; margin-top: auto; line-height: 1.4;">
                💡 <b>How to save:</b> Once generated, right-click or long-press directly on the final image preview to save it as a transparent PNG file.
            </p>
        </div>

        <!-- Fullscreen Canvas Staging Presenter Grid -->
        <div class="preview-stage">
            <div class="spinner" id="loading-spinner"></div>
            <!-- The Native Right-Click Save Target -->
            <img id="sticker-output" alt="Your Generated AI Sticker">
        </div>
    </div>

    <!-- Processing Pipeline Canvas Element -->
    <canvas id="hidden-canvas" width="512" height="512"></canvas>

    <script>
        const promptInput = document.getElementById('prompt-input');
        const generateBtn = document.getElementById('generate-btn');
        const statusText = document.getElementById('status-text');
        const spinner = document.getElementById('loading-spinner');
        const imgOutput = document.getElementById('sticker-output');
        
        const canvas = document.getElementById('hidden-canvas');
        const ctx = canvas.getContext('2d');

        async function generateAISticker() {
            const userPrompt = promptInput.value.trim();
            if (!userPrompt) return alert("Please type an object name!");

            // Update UI State layout elements
            generateBtn.disabled = true;
            spinner.style.display = "block";
            imgOutput.style.display = "none";
            statusText.textContent = "AI engine is drawing...";

            // Constructing an optimized layout string to make the AI force object isolation over plain black backgrounds
            const targetPrompt = `${userPrompt}, 3d cute emoji sticker layout, centered single object, solid completely black background, professional digital app illustration style, high resolution`;
            const seed = Math.floor(Math.random() * 999999);
            
            // Native cloud API routing structure
            const fetchUrl = `https://pollinations.ai{encodeURIComponent(targetPrompt)}?width=512&height=512&seed=${seed}&nologo=true`;

            try {
                // FETCH CONVERSION BLOCK: Downloads image as array data blocks to completely prevent CORS canvas security locks
                const response = await fetch(fetchUrl);
                if (!response.ok) throw new Error("Network generation error");
                
                const blob = await response.blob();
                
                // Convert array blocks safely into internal browser memory Base64 lines
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = function () {
                    const base64data = reader.result;
                    
                    const img = new Image();
                    img.src = base64data;
                    img.onload = function() {
                        statusText.textContent = "Stripping black matrix background and cutting edges...";
                        processStickerLayers(img);
                    };
                };

            } catch (error) {
                console.error(error);
                statusText.textContent = "Generation failed. Try re-clicking the generate button.";
                generateBtn.disabled = false;
                spinner.style.display = "none";
            }
        }

        function processStickerLayers(aiImage) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. Draw raw AI asset matrix to canvas
            ctx.drawImage(aiImage, 0, 0, canvas.width, canvas.height);
            
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;

            // 2. CHROMA KEY PARSER: Wipe away black pixels to render true transparent alpha space channels
            for (let i = 0; i < data.length; i += 4) {
                let r = data[i];
                let g = data[i + 1];
                let b = data[i + 2];
                
                // If pixel color maps near dark background thresholds, purge alpha down to zero
                if (r < 45 && g < 45 && b < 45) {
                    data[i + 3] = 0; 
                }
            }
            ctx.putImageData(imgData, 0, 0);

            // Copy transparency isolated item layout out to a secondary offscreen mask canvas
            const cutOutCanvas = document.createElement('canvas');
            cutOutCanvas.width = canvas.width;
            cutOutCanvas.height = canvas.height;
            const cutOutCtx = cutOutCanvas.getContext('2d');
            cutOutCtx.drawImage(canvas, 0, 0);
