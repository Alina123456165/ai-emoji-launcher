<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullscreen Emoji Generator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        /* App Layout */
        .app-container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }
        /* Sidebar Controls */
        .sidebar {
            width: 380px;
            background-color: #1e293b;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            border-right: 1px solid #334155;
            overflow-y: auto;
            z-index: 10;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #38bdf8;
            margin-bottom: 0.5rem;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        label {
            font-size: 0.875rem;
            font-weight: 600;
            color: #94a3b8;
        }
        .grid-options {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            max-height: 180px;
            overflow-y: auto;
            background: #0f172a;
            padding: 0.5rem;
            border-radius: 0.5rem;
        }
        .option-btn {
            background: none;
            border: 2px solid transparent;
            font-size: 1.75rem;
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 0.375rem;
            transition: all 0.2s;
        }
        .option-btn:hover {
            background-color: #334155;
        }
        .option-btn.active {
            border-color: #38bdf8;
            background-color: #0f172a;
        }
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 100%;
            height: 40px;
            border-radius: 0.5rem;
            cursor: pointer;
            background: none;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 0.5rem; }

        .btn {
            background-color: #38bdf8;
            color: #0f172a;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
        }
        .btn:hover { background-color: #7dd3fc; }
        .btn-secondary {
            background-color: #475569;
            color: #f8fafc;
        }
        .btn-secondary:hover { background-color: #64748b; }

        /* Canvas Main Stage */
        .stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0f172a;
            position: relative;
            padding: 2rem;
        }
        .canvas-container {
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 1rem;
            overflow: hidden;
            background: #1e293b;
            line-height: 0;
        }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 80vh;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Application Control Center -->
        <div class="sidebar">
            <div>
                <h1>Emoji Generator</h1>
                <p style="color: #64748b; font-size: 0.875rem;">Build custom mixed emojis instantly.</p>
            </div>

            <!-- Base Face Option -->
            <div class="control-group">
                <label>1. Base Contour</label>
                <div class="grid-options" id="base-options"></div>
            </div>

            <!-- Eyes Option -->
            <div class="control-group">
                <label>2. Eye Expression</label>
                <div class="grid-options" id="eyes-options"></div>
            </div>

            <!-- Mouth Option -->
            <div class="control-group">
                <label>3. Mouth / Emotion</label>
                <div class="grid-options" id="mouth-options"></div>
            </div>

            <!-- Background Color Tint -->
            <div class="control-group">
                <label>Background Canvas Tone</label>
                <input type="color" id="bg-color" value="#1e293b">
            </div>

            <!-- Action Triggers -->
            <button class="btn" id="download-btn">Export Custom Emoji (.png)</button>
            <button class="btn btn-secondary" id="random-btn">Randomize Components</button>
        </div>

        <!-- Live Presentation Window -->
        <div class="stage">
            <div class="canvas-container">
                <canvas id="emojiCanvas" width="500" height="500"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Resource configurations
        const bases = ['😀', '👽', '🤖', '🐱', '🐶', '👻', '🎃', '💩'];
        const eyes = ['👀', '👁️', '🕶️', '😍', '😉', '😭', '😡', '😱'];
        const mouths = ['👄', '👅', '😂', '🔥', '💖', '⭐', '☀️', '💨'];

        // Selections state
        let currentBase = bases[0];
        let currentEyes = eyes[0];
        let currentMouth = mouths[0];

        const canvas = document.getElementById('emojiCanvas');
        const ctx = canvas.getContext('2d');

        // Initialize Option Grids
        function initGrid(elementId, items, setterCallback) {
            const container = document.getElementById(elementId);
            items.forEach((item, index) => {
                const btn = document.createElement('button');
                btn.className = `option-btn ${index === 0 ? 'active' : ''}`;
                btn.textContent = item;
                btn.onclick = () => {
                    container.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    setterCallback(item);
                };
                container.appendChild(btn);
            });
        }

        // Layer Rendering Engine
        function renderEmoji() {
            const bgColor = document.getElementById('bg-color').value;
            
            // Clean Canvas and set solid background
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Draw Base Contour Layer
            ctx.font = '240px serif';
            ctx.fillText(currentBase, canvas.width / 2, canvas.height / 2);

            // Draw Upper Layer (Eyes)
            ctx.font = '100px serif';
            ctx.fillText(currentEyes, canvas.width / 2, (canvas.height / 2) - 30);

            // Draw Lower Layer (Mouth)
            ctx.font = '90px serif';
            ctx.fillText(currentMouth, canvas.width / 2, (canvas.height / 2) + 70);
        }

        // Automatic Randomizer
        function randomize() {
            currentBase = bases[Math.floor(Math.random() * bases.length)];
            currentEyes = eyes[Math.floor(Math.random() * eyes.length)];
            currentMouth = mouths[Math.floor(Math.random() * mouths.length)];

            updateActiveClasses('base-options', currentBase);
            updateActiveClasses('eyes-options', currentEyes);
            updateActiveClasses('mouth-options', currentMouth);
            renderEmoji();
        }

        function updateActiveClasses(containerId, activeText) {
            const btns = document.getElementById(containerId).querySelectorAll('.option-btn');
            btns.forEach(btn => {
                if(btn.textContent === activeText) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        // File Exporter
        document.getElementById('download-btn').addEventListener('click', () => {
            const image = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = 'custom-emoji.png';
            link.href = image;
            link.click();
        });

        // Event hooks
        document.getElementById('random-btn').addEventListener('click', randomize);
        document.getElementById('bg-color').addEventListener('input', renderEmoji);

        // Bootstrap Core
        initGrid('base-options', bases, (val) => { currentBase = val; renderEmoji(); });
        initGrid('eyes-options', eyes, (val) => { currentEyes = val; renderEmoji(); });
        initGrid('mouth-options', mouths, (val) => { currentMouth = val; renderEmoji(); });

        // Initial paint run
        renderEmoji();
    </script>
</body>
</html>
