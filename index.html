<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>AI Sticker App</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  body {
    margin: 0;
    font-family: system-ui;
    background: #0b0b0b;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 70px 12px 20px 12px;
  }

  input, select {
    width: 100%;
    max-width: 360px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 8px;
    font-size: 16px;
  }

  button {
    margin-top: 10px;
    padding: 10px 14px;
    border-radius: 10px;
    border: none;
    background: white;
    color: black;
    font-weight: 600;
  }

  #img {
    width: 280px;
    height: 280px;
    margin-top: 12px;
    border-radius: 18px;
    display: none;
    object-fit: cover;
    background: #111;
  }

  #status {
    margin-top: 10px;
    opacity: 0.7;
  }

  /* Hidden iframe kept for app-view behavior */
  iframe {
    position: absolute;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
    border: none;
  }
</style>
</head>

<body>

<input id="text" placeholder="type: fire cat, anime skull">

<select id="style">
  <option value="cute sticker, soft lighting">Cute</option>
  <option value="anime style, bold outline">Anime</option>
  <option value="3d render, glossy">3D</option>
  <option value="graffiti street art">Graffiti</option>
  <option value="minimal flat icon">Minimal</option>
</select>

<button onclick="generate()">Generate</button>

<div id="status"></div>

<img id="img">

<!-- Hidden iframe retained -->
<iframe src="https://perchance.org/ai-text-to-image-generator"></iframe>

<script>

let isGenerating = false;

function setStatus(text) {
  document.getElementById("status").innerText = text;
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function buildUrl(prompt) {
  return "https://image.pollinations.ai/prompt/" +
    encodeURIComponent(prompt);
}

async function loadImage(url) {
  return new Promise((resolve) => {

    const imgLoader = new Image();

    let finished = false;

    const timeout = setTimeout(() => {
      if (!finished) {
        finished = true;
        resolve(false);
      }
    }, 15000);

    imgLoader.onload = () => {
      if (finished) return;

      finished = true;
      clearTimeout(timeout);

      resolve(true);
    };

    imgLoader.onerror = () => {
      if (finished) return;

      finished = true;
      clearTimeout(timeout);

      resolve(false);
    };

    imgLoader.src = url;
  });
}

async function generate() {

  if (isGenerating) {
    setStatus("Please wait...");
    return;
  }

  const text =
    document.getElementById("text").value.trim();

  if (!text) return;

  const style =
    document.getElementById("style").value;

  const img =
    document.getElementById("img");

  isGenerating = true;

  setStatus("Generating...");

  // IMPORTANT:
  // randomized prompt prevents CDN reuse
  const basePrompt =
    `${text}, ${style}, sticker, high detail`;

  let success = false;

  for (let i = 0; i < 3; i++) {

    const uniquePrompt =
      basePrompt + " " + Date.now() + " try" + i;

    const url = buildUrl(uniquePrompt);

    const loaded = await loadImage(url);

    if (loaded) {

      img.src = url;
      img.style.display = "block";

      setStatus("Done");

      success = true;
      break;
    }

    setStatus("Retrying...");
    await sleep(1400);
  }

  if (!success) {
    setStatus("AI is overloaded — try again");
  }

  isGenerating = false;
}

</script>

</body>
</html>
